<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Santos County - Staff Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="logo.webp" alt="Logo" class="login-logo">
            <h2>Accesso Staff</h2>
            <input type="text" id="username" placeholder="Username (es. Hydro)">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()">Entra</button>
            <p id="login-error">Credenziali errate!</p>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <header>
            <img src="logo.webp" alt="Logo" class="header-logo">
            <h1>Gestione Staff ITD</h1>
        </header>

        <div class="container">
            <section>
                <h2>📋 Turni Settimanali (Numeri Pari)</h2>
                <div class="table-wrapper">
                    <table id="scheduleTable">
                        <thead>
                            <tr>
                                <th>Giorno</th>
                                <th>Pomeriggio (15:00 - 19:00)</th>
                                <th>Sera (21:00 - 01:00)</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </section>

            <section>
                <h2>👥 Elenco Completo Matricole</h2>
                <div class="table-wrapper">
                    <table id="staffTable">
                        <thead>
                            <tr>
                                <th>Matricola</th>
                                <th>Nome</th>
                                <th>Stato</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login Staff</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .hidden {
            display: none;
        }
        #loginView, #appView {
            max-width: 400px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #loginError {
            color: red;
            margin-bottom: 10px;
            display: none;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        /* Stile extra per l'app, se necessario */
    </style>
</head>
<body>

<div id="loginView">
    <h2>Login Staff</h2>
    <div id="loginError"></div>
    <input type="text" id="loginUsername" placeholder="Username" />
    <input type="password" id="loginPassword" placeholder="Password" />
    <button id="loginBtn">Accedi</button>
</div>

<div id="appView" class="hidden">
    <h2>Benvenuto</h2>
    <p>Sei loggato come <span id="userDisplay"></span></p>
    <!-- Puoi aggiungere qui le funzionalità dell'app -->
    <button id="logoutBtn">Logout</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
    // Configurazione Firebase (sostituisci con i tuoi dati)
    const firebaseConfig = {
        apiKey: "API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Inizializza Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Elementi DOM
    const loginView = document.getElementById("loginView");
    const appView = document.getElementById("appView");
    const loginBtn = document.getElementById("loginBtn");
    const loginUsername = document.getElementById("loginUsername");
    const loginPassword = document.getElementById("loginPassword");
    const loginError = document.getElementById("loginError");
    const userDisplay = document.getElementById("userDisplay");
    const logoutBtn = document.getElementById("logoutBtn");

    let currentUser = null;

    // Gestione login
    loginBtn.addEventListener("click", async () => {
        const user = loginUsername.value.trim();
        const pass = loginPassword.value;

        if (!user || !pass) {
            showLoginError("Inserisci username e password.");
            return;
        }

        const ref = db.ref("staff/" + user);
        const snap = await ref.get();

        if (!snap.exists()) {
            showLoginError("Utente non trovato.");
            return;
        }

        const data = snap.val();

        if (data.password !== pass) {
            showLoginError("Password errata.");
            return;
        }

        // Login riuscito
        loginError.style.display = "none";
        currentUser = user;
        userDisplay.innerText = user;

        // Aggiorna lastLogin e stato duty
        ref.update({
            lastLogin: Date.now(),
            dutyStatus: "offline"
        });

        // Mostra app
        loginView.classList.add("hidden");
        appView.classList.remove("hidden");
    });

    // Logout
    logoutBtn.addEventListener("click", () => {
        currentUser = null;
        loginUsername.value = "";
        loginPassword.value = "";
        loginView.classList.remove("hidden");
        appView.classList.add("hidden");
    });

    function showLoginError(message) {
        loginError.innerText = message;
        loginError.style.display = "block";
    }
</script>

</body>
</html>

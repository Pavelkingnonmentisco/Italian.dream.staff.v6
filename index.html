<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDR STAFF PORTAL v39.0 | 2026</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #000000;
            --card-bg: #0a0a0a;
            --danger: #ff4d4d;
            --glass: rgba(212, 175, 55, 0.1);
        }

        body {
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- NAVBAR --- */
        nav {
            background: #050505;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; flex: 1; }

        nav button {
            background: var(--glass);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
            font-size: 10px;
        }

        nav button:hover { background: var(--gold); color: #000; }

        /* --- LAYOUT --- */
        .container { padding: 30px; max-width: 1200px; margin: auto; text-align: center; flex: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .card h3 { color: var(--gold); margin: 0; font-size: 11px; text-transform: uppercase; }
        .card p { font-size: 18px; margin: 10px 0; font-weight: bold; color: #eee; }

        .img-header { width: 100%; max-width: 550px; border-radius: 15px; margin-bottom: 30px; border: 2px solid var(--gold); display: block; margin-left: auto; margin-right: auto; }

        .m-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.2); }
        .m-table th { background: var(--gold); color: black; padding: 15px; text-align: left; font-size: 12px; }
        .m-table td { padding: 12px 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); text-align: left; }

        /* --- ADMIN --- */
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; text-align: left; }
        .admin-card { background: #080808; padding: 20px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.3); }

        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; }
        .btn-primary { width: 100%; padding: 12px; background: var(--gold); border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        
        #timer-val { font-size: 70px; font-weight: 900; margin: 20px 0; display: block; color: var(--gold); }
        footer { background: #050505; padding: 15px; text-align: center; font-size: 11px; color: var(--gold); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box" style="margin: 100px auto; background: var(--card-bg); padding: 40px; border-radius: 20px; border: 2px solid var(--gold); width: 320px; text-align: center;">
            <h2 style="color:var(--gold)">ITDR LOGIN</h2>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn-primary" onclick="login()">ACCEDI</button>
        </div>
    </div>

    <div id="portal" class="hidden">
        <nav>
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif" class="nav-logo">
            <div class="nav-links">
                <button onclick="tab('area')">Home</button>
                <button onclick="tab('servizio')">Servizio</button>
                <button onclick="tab('turni')">Turni</button>
                <button onclick="tab('matricole')">Matricole</button>
                <button id="adm-btn" class="hidden" onclick="tab('admin')">Admin</button>
                <button onclick="location.reload()" style="color:var(--danger)">Esci</button>
            </div>
        </nav>

        <div class="container">
            <section id="area">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773154806/xtb9kcfg5ian3x9fiq9w.gif" class="img-header">
                <div class="grid">
                    <div class="card"><h3>Grado</h3><p id="u-grado">-</p></div>
                    <div class="card"><h3>Matricola</h3><p id="u-mat">-</p></div>
                    <div class="card"><h3>Tempo</h3><p id="u-ore">00:00:00</p></div>
                </div>
            </section>

            <section id="turni" class="hidden">
                <div class="card">
                    <h3>Visualizza Turni Settimanali</h3>
                    <select id="view-day" onchange="showDay(this.value)">
                        <option value="">Scegli Giorno...</option>
                        <option value="Lunedi">Lunedi</option><option value="Martedi">Martedi</option><option value="Mercoledi">Mercoledi</option><option value="Giovedi">Giovedi</option><option value="Venerdi">Venerdi</option><option value="Sabato">Sabato</option><option value="Domenica">Domenica</option>
                    </select>
                </div>
                <div class="grid">
                    <div class="card"><h3>Pomeriggio (15:00 - 19:00)</h3><p id="p-list">-</p></div>
                    <div class="card"><h3>Sera (21:00 - 01:00)</h3><p id="s-list">-</p></div>
                </div>
            </section>

            <section id="matricole" class="hidden">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773168536/vyhu3p1x8nasmlap6z7p.png" class="img-header">
                <table class="m-table">
                    <thead><tr><th>Mat.</th><th>Staffer</th><th>Grado</th></tr></thead>
                    <tbody id="m-body"></tbody>
                </table>
            </section>

            <section id="admin" class="hidden">
                <div class="admin-grid">
                    <div class="admin-card">
                        <h3 style="color:var(--gold)">GENERATORE TURNI CASUALI</h3>
                        <p style="font-size: 12px;">Genera 3 staffer a caso per ogni turno della settimana.</p>
                        <button class="btn-primary" onclick="generateRandomTurni()">GENERA TURNI SETTIMANA</button>
                    </div>
                    <div class="admin-card">
                        <h3 style="color:var(--gold)">GESTIONE MANUALE</h3>
                        <select id="t-day"><option value="Lunedi">Lunedi</option><option value="Martedi">Martedi</option><option value="Mercoledi">Mercoledi</option><option value="Giovedi">Giovedi</option><option value="Venerdi">Venerdi</option><option value="Sabato">Sabato</option><option value="Domenica">Domenica</option></select>
                        <select id="t-slot"><option value="p">Pomeriggio</option><option value="s">Sera</option></select>
                        <input type="text" id="t-staff" placeholder="Nomi manuali">
                        <button class="btn-primary" onclick="saveTurni()">SALVA MANUALE</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const STAFF_POOL = ["Barone","Hydro","Fabbri","Matz","Nathalino","Viper","Xenoo","Adamo","Nano","Gabriel","Chorno","Joker","Nenne","Mattia","Lollo","Simo","Vortex","Void","Sangue","Ibra","Noxen","Ash","Pietro"];
        const ADM_LIST = ["Daniel", "Michele", "Mav", "Arduino", "Pavel"];

        let db = JSON.parse(localStorage.getItem('ITDR_V39_DB')) || {};
        let tr = JSON.parse(localStorage.getItem('ITDR_V39_TR')) || { 
            "Lunedi":{p:"-",s:"-"}, "Martedi":{p:"-",s:"-"}, "Mercoledi":{p:"-",s:"-"}, "Giovedi":{p:"-",s:"-"}, "Venerdi":{p:"-",s:"-"}, "Sabato":{p:"-",s:"-"}, "Domenica":{p:"-",s:"-"} 
        };

        function login() {
            let u = document.getElementById('user-in').value.trim();
            if(u) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                if(ADM_LIST.includes(u)) document.getElementById('adm-btn').classList.remove('hidden');
                renderMatricole();
            }
        }

        function generateRandomTurni() {
            const giorni = ["Lunedi", "Martedi", "Mercoledi", "Giovedi", "Venerdi", "Sabato", "Domenica"];
            giorni.forEach(g => {
                let rimescolato = [...STAFF_POOL].sort(() => 0.5 - Math.random());
                tr[g].p = rimescolato.slice(0, 3).join(", ");
                tr[g].s = rimescolato.slice(3, 6).join(", ");
            });
            localStorage.setItem('ITDR_V39_TR', JSON.stringify(tr));
            alert("Turni generati con successo!");
        }

        function showDay(d) {
            if(!d) return;
            document.getElementById('p-list').innerText = tr[d].p;
            document.getElementById('s-list').innerText = tr[d].s;
        }

        function saveTurni() {
            let d = document.getElementById('t-day').value;
            let s = document.getElementById('t-slot').value;
            tr[d][s] = document.getElementById('t-staff').value || "-";
            localStorage.setItem('ITDR_V39_TR', JSON.stringify(tr));
            alert("Salvato!");
        }

        function renderMatricole() {
            let b = document.getElementById('m-body');
            b.innerHTML = STAFF_POOL.map((s, i) => `<tr><td>ITD-${i+14}</td><td>${s}</td><td>Staff</td></tr>`).join('');
        }

        function tab(id) {
            ["area", "turni", "matricole", "admin"].forEach(t => {
                const el = document.getElementById(t);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>

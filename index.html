<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDR STAFF PORTAL v30 | 2026</title>
    <style>
        :root {
            --blue: #007bff;
            --dark: #051e34;
            --danger: #dc3545;
            --accent: #00d4ff;
            --glass: rgba(0, 123, 255, 0.1);
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://res.cloudinary.com/dbxwiln0a/image/upload/v1773154953/eb3pca3vvbnearhoockt.webp');
            background-size: cover;
            background-position: center;
        }

        .login-box {
            background: rgba(5, 30, 52, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--blue);
            text-align: center;
            width: 360px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        /* --- NAVBAR --- */
        nav {
            background: var(--dark);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--blue);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--blue); }
        .nav-links { display: flex; gap: 8px; }

        nav button {
            background: var(--glass);
            color: #fff;
            border: 1px solid var(--blue);
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
            font-size: 10px;
        }

        nav button:hover { background: var(--blue); }

        /* --- TASTI TURNI (ESTETICA 2026) --- */
        .turni-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .day-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent);
            color: #fff;
            padding: 15px 20px;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            min-width: 110px;
        }
        .day-btn:hover, .day-btn.active-day { background: var(--blue); box-shadow: 0 0 15px var(--accent); transform: translateY(-3px); }

        /* --- LAYOUT --- */
        .container { padding: 30px; max-width: 1100px; margin: auto; text-align: center; flex: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--dark); padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .img-header { width: 100%; max-width: 550px; border-radius: 15px; margin-bottom: 30px; border: 2px solid var(--blue); }

        .m-table { width: 100%; border-collapse: collapse; background: var(--dark); border-radius: 10px; overflow: hidden; }
        .m-table th { background: var(--blue); color: white; padding: 15px; text-align: left; }
        .m-table td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* --- ADMIN --- */
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; text-align: left; }
        .admin-card { background: #0a2540; padding: 20px; border-radius: 12px; border: 1px solid #1a3a5a; }
        
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 5px; }
        .btn-primary { width: 100%; padding: 10px; background: var(--blue); border: none; color: #fff; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-danger { background: var(--danger); margin-top: 5px; }
        .btn-warn { background: #f39c12; margin-top: 5px; }

        footer { padding: 20px; text-align: center; color: #555; font-size: 11px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp" width="80">
            <h2>ITDR STAFF PORTAL</h2>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn-primary" onclick="login()">ACCEDI</button>
            <p style="font-size: 10px; color: #444; margin-top: 15px;">© 2026 | Sviluppato da Pavel</p>
        </div>
    </div>

    <div id="portal" class="hidden">
        <nav>
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif" class="nav-logo">
            <div class="nav-links">
                <button onclick="tab('area')">Home</button>
                <button onclick="tab('servizio')">Servizio</button>
                <button onclick="tab('turni')">Turni</button>
                <button onclick="tab('matricole')">Membri</button>
                <button id="adm-btn" class="hidden" onclick="tab('admin')">Admin</button>
                <button onclick="location.reload()" style="color:var(--danger)">Esci</button>
            </div>
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif" class="nav-logo">
        </nav>

        <div class="container">
            <section id="area">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773154806/xtb9kcfg5ian3x9fiq9w.gif" class="img-header">
                <div class="grid">
                    <div class="card"><h3>Grado</h3><p id="u-grado">-</p></div>
                    <div class="card"><h3>Matricola</h3><p id="u-mat">-</p></div>
                    <div class="card"><h3>Ore Totali</h3><p id="u-ore">00:00:00</p></div>
                    <div class="card"><h3>Sanzioni</h3><p id="u-warns" style="color:var(--danger)">0</p></div>
                </div>
            </section>

            <section id="turni" class="hidden">
                <div class="turni-container">
                    <button class="day-btn" onclick="showDay('Lunedi', event)">LUN</button>
                    <button class="day-btn" onclick="showDay('Martedi', event)">MAR</button>
                    <button class="day-btn" onclick="showDay('Mercoledi', event)">MER</button>
                    <button class="day-btn" onclick="showDay('Giovedi', event)">GIO</button>
                    <button class="day-btn" onclick="showDay('Venerdi', event)">VEN</button>
                    <button class="day-btn" onclick="showDay('Sabato', event)">SAB</button>
                    <button class="day-btn" onclick="showDay('Domenica', event)">DOM</button>
                </div>
                <div class="card">
                    <h2 id="day-title" style="color:var(--accent)">Scegli un giorno</h2>
                    <div class="grid">
                        <div class="card"><h4>Pomeriggio</h4><p id="p-list" style="font-size:16px">-</p></div>
                        <div class="card"><h4>Sera</h4><p id="s-list" style="font-size:16px">-</p></div>
                    </div>
                </div>
            </section>

            <section id="servizio" class="hidden">
                <div class="card"><span id="timer-val" style="font-size:60px">00:00:00</span><br>
                <button id="t-btn" class="btn-primary" style="width:200px" onclick="toggleT()">INIZIA</button></div>
            </section>

            <section id="matricole" class="hidden">
                <table class="m-table">
                    <thead><tr><th>Mat.</th><th>Nome</th><th>Grado</th><th>Richiami</th></tr></thead>
                    <tbody id="m-body"></tbody>
                </table>
            </section>

            <section id="admin" class="hidden">
                <div class="admin-grid">
                    <div class="admin-card">
                        <h3>GESTIONE OPERATORE</h3>
                        <select id="s-sel" onchange="loadStaffData()"></select>
                        <input type="text" id="ed-g" placeholder="Grado">
                        <input type="number" id="ed-h" placeholder="Secondi ore">
                        <button class="btn-primary" onclick="saveStaffData()">SALVA MODIFICHE</button>
                        
                        <h4 style="margin-top:20px; border-top:1px solid #1a3a5a; pt:10px">SANZIONI / RICHIAMI</h4>
                        <div style="display:flex; gap:5px">
                            <button class="btn-primary btn-warn" onclick="addWarn()">+1 RICHIAMO</button>
                            <button class="btn-primary btn-danger" onclick="resetWarns()">AZZERA</button>
                        </div>
                    </div>
                    
                    <div class="admin-card">
                        <h3>ARRUOLA</h3>
                        <input type="text" id="new-n" placeholder="Nome">
                        <input type="text" id="new-g" placeholder="Grado">
                        <input type="text" id="new-m" placeholder="Matricola">
                        <input type="text" id="new-p" placeholder="Password">
                        <button class="btn-primary" style="background:#28a745" onclick="addNewStaff()">AGGIUNGI</button>
                    </div>
                </div>
            </section>
        </div>

        <footer>© 2026 ITDR Staff Portal | Powered by Pavel</footer>
    </div>

    <script>
        const ADM_LIST = ["Daniel", "Michele", "Mav", "Arduino", "Strepitoso", "Archadian", "Djsamy", "Cobra", "Baj", "Mirko", "Maverick", "Pavel"];
        let db = JSON.parse(localStorage.getItem('ITDR_V30_DB')) || {};
        let tr = JSON.parse(localStorage.getItem('ITDR_V30_TR')) || {
            "Lunedi":{p:"Barone, Hydro, Fabbri", s:"Matz, Nathalino, Viper"}, "Martedi":{p:"Xenoo, Adamo, Gabriel", s:"Chorno, Joker, Nenne"}, "Mercoledi":{p:"Mattia, Lollo, Simo", s:"Vortex, Void, Sangue"}, "Giovedi":{p:"Ibra, Noxen, Ash", s:"Barone, Hydro, Fabbri"}, "Venerdi":{p:"Matz, Nathalino, Viper", s:"Xenoo, Adamo, Gabriel"}, "Sabato":{p:"Chorno, Joker, Nenne", s:"Mattia, Lollo, Simo"}, "Domenica":{p:"Vortex, Void, Sangue", s:"Ibra, Noxen, Ash"}
        };

        if(Object.keys(db).length === 0) {
            const RAW = [["Daniel","Founder","ITD-01"],["Michele","Founder","ITD-02"],["Mav","Co-Founder","ITD-03"],["Arduino","Owner","ITD-04"],["Strepitoso","Co Owner","ITD-05"],["Archadian","Co Owner","ITD-06"],["Djsamy","Community Manager","ITD-07"],["Cobra","Community Manager","ITD-08"],["Baj","Server Supervisor","ITD-09"],["Mirko","Staff Manager","ITD-10"],["Maverick","Staff Manager","ITD-11"],["Pavel","Supervisor","ITD-12"]];
            RAW.forEach(s => { db[s[0]] = { pass: s[0]+"-01", grado: s[1], mat: s[2], ore: 0, warns: 0 }; });
            save();
        }

        let user = null, sec = 0, interval = null, on = false;

        function login() {
            let u = document.getElementById('user-in').value.trim();
            let p = document.getElementById('pass-in').value.trim();
            if(db[u] && db[u].pass === p) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                if(ADM_LIST.includes(u)) { document.getElementById('adm-btn').classList.remove('hidden'); refreshAdmList(); }
                updateArea(); renderMatricole();
            } else alert("Dati errati!");
        }

        function updateArea() {
            document.getElementById('u-grado').innerText = db[user].grado;
            document.getElementById('u-mat').innerText = db[user].mat;
            document.getElementById('u-ore').innerText = fmt(db[user].ore);
            document.getElementById('u-warns').innerText = db[user].warns;
        }

        function addWarn() {
            let s = document.getElementById('s-sel').value;
            if(!s) return;
            db[s].warns += 1;
            save(); renderMatricole(); if(s === user) updateArea();
            alert("Richiamo aggiunto a " + s);
        }

        function resetWarns() {
            let s = document.getElementById('s-sel').value;
            if(!s) return;
            if(confirm("Azzerare i richiami di " + s + "?")) {
                db[s].warns = 0;
                save(); renderMatricole(); if(s === user) updateArea();
            }
        }

        function loadStaffData() {
            let s = document.getElementById('s-sel').value;
            document.getElementById('ed-g').value = db[s].grado;
            document.getElementById('ed-h').value = db[s].ore;
        }

        function saveStaffData() {
            let s = document.getElementById('s-sel').value;
            db[s].grado = document.getElementById('ed-g').value;
            db[s].ore = parseInt(document.getElementById('ed-h').value);
            save(); renderMatricole(); alert("Dati aggiornati!");
        }

        function toggleT() {
            let b = document.getElementById('t-btn');
            if(!on) {
                on = true; b.innerText = "FINE"; b.classList.add('btn-danger');
                interval = setInterval(() => { sec++; document.getElementById('timer-val').innerText = fmt(sec); }, 1000);
            } else {
                on = false; b.innerText = "INIZIA"; b.classList.remove('btn-danger');
                clearInterval(interval); db[user].ore += sec; sec = 0;
                document.getElementById('timer-val').innerText = "00:00:00";
                save(); updateArea();
            }
        }

        function showDay(d, e) {
            document.getElementById('day-title').innerText = d;
            document.getElementById('p-list').innerText = tr[d].p;
            document.getElementById('s-list').innerText = tr[d].s;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active-day'));
            e.target.classList.add('active-day');
        }

        function renderMatricole() {
            let b = document.getElementById('m-body');
            b.innerHTML = Object.keys(db).sort().map(k => `<tr><td>${db[k].mat}</td><td>${k}</td><td>${db[k].grado}</td><td style="color:${db[k].warns > 0 ? 'red':'white'}">${db[k].warns}</td></tr>`).join('');
        }

        function refreshAdmList() {
            let s = document.getElementById('s-sel');
            s.innerHTML = Object.keys(db).sort().map(k => `<option value="${k}">${k}</option>`).join('');
        }

        function tab(id) {
            ["area", "servizio", "turni", "matricole", "admin"].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
        function save() { localStorage.setItem('ITDR_V30_DB', JSON.stringify(db)); localStorage.setItem('ITDR_V30_TR', JSON.stringify(tr)); }
    </script>
</body>
</html>

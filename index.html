<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDR STAFF PORTAL v31.2 | 2026</title>
    <style>
        :root {
            --blue: #007bff;
            --dark: #051e34;
            --danger: #dc3545;
            --accent: #00d4ff;
            --glass: rgba(0, 123, 255, 0.15);
            --card-bg: rgba(0, 0, 0, 0.75);
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- CONFIGURAZIONE SFONDI SEZIONI --- */
        section {
            min-height: calc(100vh - 70px);
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
            padding: 40px 20px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        /* Area Personale */
        #area { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://res.cloudinary.com/dbxwiln0a/image/upload/v1773159772/dejgkvp5mafpswebsklx.webp'); 
        }
        /* Servizio */
        #servizio { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://res.cloudinary.com/dbxwiln0a/image/upload/v1773159773/xdjgrwzdhv2b8pjnaid0.webp'); 
        }
        /* Turni */
        #turni { 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://image2url.com/r2/default/images/1773159871831-355d56c8-6aeb-4d24-b7a3-88e2d3af8f7a.webp'); 
        }
        /* Membri */
        #matricole { 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://kommodo.ai/i/diU5wMpInkEMTu73mamN'); 
        }
        #admin { background: #051e34; }

        /* --- LOGIN --- */
        #login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://res.cloudinary.com/dbxwiln0a/image/upload/v1773154953/eb3pca3vvbnearhoockt.webp');
            background-size: cover;
            background-position: center;
        }

        .login-box {
            background: rgba(5, 30, 52, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--blue);
            text-align: center;
            width: 360px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* --- NAVBAR --- */
        nav {
            background: rgba(5, 30, 52, 0.95);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--blue);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-logo { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--blue); }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; flex: 1; }

        nav button {
            background: var(--glass);
            color: #fff;
            border: 1px solid var(--blue);
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
            font-size: 10px;
        }
        nav button:hover { background: var(--blue); }

        /* --- CARDS & TABLES --- */
        .container { max-width: 1100px; margin: auto; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        
        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 15px; 
            border: 1px solid rgba(0, 212, 255, 0.3); 
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .card h3 { color: var(--accent); margin: 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .card p { font-size: 24px; margin: 10px 0; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        .m-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 15px; overflow: hidden; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .m-table th { background: rgba(0, 123, 255, 0.8); color: white; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; }
        .m-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.6); border: 1px solid var(--blue); color: #fff; border-radius: 6px; }
        .btn-primary { width: 100%; padding: 12px; background: var(--blue); border: none; color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; }
        
        #timer-val { font-size: 80px; font-weight: 900; margin: 20px 0; display: block; text-shadow: 0 0 25px var(--blue); color: #fff; }
        footer { background: var(--dark); padding: 15px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.5); border-top: 1px solid var(--blue); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp" width="90">
            <h2>ITDR STAFF PORTAL</h2>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn-primary" onclick="login()">ACCEDI</button>
            <p style="font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 20px;">© 2026 Sviluppato da Pavel</p>
        </div>
    </div>

    <div id="portal" class="hidden">
        <nav>
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif" class="nav-logo">
            <div class="nav-links">
                <button onclick="tab('area')">Home</button>
                <button onclick="tab('servizio')">Servizio</button>
                <button onclick="tab('turni')">Turni</button>
                <button onclick="tab('matricole')">Membri</button>
                <button id="adm-btn" class="hidden" onclick="tab('admin')">Admin</button>
                <button onclick="location.reload()" style="color:var(--danger)">Esci</button>
            </div>
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif" class="nav-logo">
        </nav>

        <div class="container">
            <section id="area">
                <div style="margin-top: 50px;">
                    <div class="grid">
                        <div class="card"><h3>Grado</h3><p id="u-grado">-</p></div>
                        <div class="card"><h3>Matricola</h3><p id="u-mat">-</p></div>
                        <div class="card"><h3>Tempo di Servizio</h3><p id="u-ore">00:00:00</p></div>
                        <div class="card"><h3>Sanzioni</h3><p id="u-warns" style="color:var(--danger)">0</p></div>
                    </div>
                </div>
            </section>

            <section id="servizio" class="hidden">
                <div style="margin-top: 100px;">
                    <div class="card" style="max-width: 600px; margin: auto;">
                        <span id="timer-val">00:00:00</span>
                        <div style="display:flex; gap:15px; justify-content: center;">
                            <button id="t-btn" class="btn-primary" style="max-width: 150px;" onclick="toggleT()">INIZIA</button>
                            <button id="p-btn" class="btn-primary btn-warn hidden" style="max-width: 150px;" onclick="togglePause()">PAUSA</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="turni" class="hidden">
                <div class="grid" style="max-width: 400px; margin: 20px auto;">
                    <div class="card">
                        <h3>Seleziona Giorno</h3>
                        <select id="view-day" onchange="showDay(this.value)">
                            <option value="">Scegli il giorno...</option>
                            <option value="Lunedi">Lunedi</option><option value="Martedi">Martedi</option><option value="Mercoledi">Mercoledi</option><option value="Giovedi">Giovedi</option><option value="Venerdi">Venerdi</option><option value="Sabato">Sabato</option><option value="Domenica">Domenica</option>
                        </select>
                    </div>
                </div>
                <div class="grid">
                    <div class="card"><h3>Pomeriggio</h3><p id="p-list">-</p></div>
                    <div class="card"><h3>Sera</h3><p id="s-list">-</p></div>
                </div>
            </section>

            <section id="matricole" class="hidden">
                <div style="overflow-x: auto; margin-top: 20px;">
                    <table class="m-table">
                        <thead><tr><th>Matricola</th><th>Staffer</th><th>Grado</th><th>Sanzioni</th></tr></thead>
                        <tbody id="m-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="admin" class="hidden">
                <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); text-align: left;">
                    <div class="card">
                        <h3>Gestione Staff</h3>
                        <select id="s-sel" onchange="loadStaffData()"><option value="">Scegli Staffer...</option></select>
                        <input type="text" id="ed-g" placeholder="Grado">
                        <input type="text" id="ed-m" placeholder="Matricola">
                        <input type="number" id="ed-h" placeholder="Secondi totali">
                        <button class="btn-primary" onclick="saveStaffData()">SALVA MODIFICHE</button>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <button class="btn-primary btn-warn" onclick="changeWarns(1)">+ SANZIONE</button>
                            <button class="btn-primary btn-danger" onclick="changeWarns(-1)">- SANZIONE</button>
                        </div>
                    </div>
                    <div class="card">
                        <h3>Editor Turni</h3>
                        <select id="e-day">
                            <option value="Lunedi">Lunedi</option><option value="Martedi">Martedi</option><option value="Mercoledi">Mercoledi</option><option value="Giovedi">Giovedi</option><option value="Venerdi">Venerdi</option><option value="Sabato">Sabato</option><option value="Domenica">Domenica</option>
                        </select>
                        <textarea id="e-p" rows="3" placeholder="Staff Pomeriggio (separati da virgola)"></textarea>
                        <textarea id="e-s" rows="3" placeholder="Staff Sera (separati da virgola)"></textarea>
                        <button class="btn-primary" onclick="saveT()">AGGIORNA TURNI</button>
                    </div>
                </div>
            </section>
        </div>
        <footer>© 2026 ITDR Staff Portal | Sviluppato con Pavel</footer>
    </div>

    <script>
        // Logica JavaScript invariata (mantenuta per funzionalità)
        const ADM_LIST = ["Daniel", "Michele", "Mav", "Arduino", "Strepitoso", "Archadian", "Djsamy", "Cobra", "Baj", "Mirko", "Maverick", "Pavel"];
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1480953347941990512/tO72Y7nUOLn0atj93WQfdwrpvOw1213-opTl7hBTmunCVvht4Ck6lJcvb_7GPm-ZcLmr";

        let db = JSON.parse(localStorage.getItem('ITDR_V27_DB')) || {};
        let tr = JSON.parse(localStorage.getItem('ITDR_V27_TR')) || { "Lunedi":{p:"-",s:"-"}, "Martedi":{p:"-",s:"-"}, "Mercoledi":{p:"-",s:"-"}, "Giovedi":{p:"-",s:"-"}, "Venerdi":{p:"-",s:"-"}, "Sabato":{p:"-",s:"-"}, "Domenica":{p:"-",s:"-"} };

        if(Object.keys(db).length === 0) {
            const RAW = [["Daniel","Founder","ITD-01"],["Pavel","Supervisor","ITD-12"]];
            RAW.forEach(s => { db[s[0]] = { pass: s[0]+"-01", grado: s[1], mat: s[2], ore: 0, warns: 0 }; });
            save();
        }

        let user = null, sec = 0, interval = null, on = false, isPaused = false;

        function login() {
            let u = document.getElementById('user-in').value.trim();
            let p = document.getElementById('pass-in').value.trim();
            if(db[u] && db[u].pass === p) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                if(ADM_LIST.includes(u)) { document.getElementById('adm-btn').classList.remove('hidden'); refreshAdmList(); }
                updateArea(); renderMatricole();
            } else alert("Credenziali Errate!");
        }

        function tab(id) {
            ["area", "servizio", "turni", "matricole", "admin"].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function updateArea() {
            document.getElementById('u-grado').innerText = db[user].grado;
            document.getElementById('u-mat').innerText = db[user].mat;
            document.getElementById('u-ore').innerText = fmt(db[user].ore);
            document.getElementById('u-warns').innerText = db[user].warns || 0;
        }

        function toggleT() {
            let b = document.getElementById('t-btn');
            let pBtn = document.getElementById('p-btn');
            if(!on) {
                on = true; isPaused = false;
                b.innerText = "FINE"; b.classList.add('btn-danger');
                pBtn.classList.remove('hidden');
                startTimer();
                sendLog("INIZIO");
            } else {
                on = false; b.innerText = "INIZIA"; b.classList.remove('btn-danger');
                pBtn.classList.add('hidden');
                clearInterval(interval);
                db[user].ore += sec;
                sendLog("FINE", sec);
                sec = 0;
                document.getElementById('timer-val').innerText = "00:00:00";
                save(); updateArea();
            }
        }

        function startTimer() { interval = setInterval(() => { sec++; document.getElementById('timer-val').innerText = fmt(sec); }, 1000); }
        function togglePause() {
            let pBtn = document.getElementById('p-btn');
            if(!isPaused) { isPaused = true; clearInterval(interval); pBtn.innerText = "RIPRENDI"; }
            else { isPaused = false; startTimer(); pBtn.innerText = "PAUSA"; }
        }

        function showDay(d) {
            if(!d) return;
            document.getElementById('p-list').innerText = tr[d].p;
            document.getElementById('s-list').innerText = tr[d].s;
        }

        function renderMatricole() {
            let b = document.getElementById('m-body');
            const sorted = Object.keys(db).sort((x,y) => db[x].mat.localeCompare(db[y].mat, undefined, {numeric: true}));
            b.innerHTML = sorted.map(k => `<tr><td>${db[k].mat}</td><td>${k}</td><td>${db[k].grado}</td><td style="color:${db[k].warns > 0 ? '#ff4d4d':'white'}">${db[k].warns || 0}</td></tr>`).join('');
        }

        function loadStaffData() {
            let s = document.getElementById('s-sel').value;
            if(!s) return;
            document.getElementById('ed-g').value = db[s].grado;
            document.getElementById('ed-m').value = db[s].mat;
            document.getElementById('ed-h').value = db[s].ore;
        }

        function saveStaffData() {
            let s = document.getElementById('s-sel').value;
            if(!s) return;
            db[s].grado = document.getElementById('ed-g').value;
            db[s].mat = document.getElementById('ed-m').value;
            db[s].ore = parseInt(document.getElementById('ed-h').value);
            save(); renderMatricole(); alert("Dati salvati!");
        }

        function changeWarns(val) {
            let s = document.getElementById('s-sel').value;
            if(!s) return;
            db[s].warns = Math.max(0, (db[s].warns || 0) + val);
            save(); renderMatricole();
        }

        function saveT() {
            let d = document.getElementById('e-day').value;
            tr[d] = { p: document.getElementById('e-p').value, s: document.getElementById('e-s').value };
            save(); alert("Turni salvati!");
        }

        function refreshAdmList() {
            let s = document.getElementById('s-sel');
            s.innerHTML = '<option value="">Scegli...</option>';
            Object.keys(db).sort().forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
        }

        function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
        function save() { localStorage.setItem('ITDR_V27_DB', JSON.stringify(db)); localStorage.setItem('ITDR_V27_TR', JSON.stringify(tr)); }

        async function sendLog(tipo, sessione = 0) {
            if(!DISCORD_WEBHOOK) return;
            const now = new Date().toLocaleTimeString('it-IT');
            let embed = {
                username: "ITDR LOG",
                embeds: [{
                    title: tipo === "INIZIO" ? "🚀 SERVIZIO AVVIATO" : "🏁 SERVIZIO CONCLUSO",
                    color: tipo === "INIZIO" ? 0x00ff00 : 0xff0000,
                    fields: [
                        { name: "Staff", value: user, inline: true },
                        { name: "Matricola", value: db[user].mat, inline: true },
                        { name: "Orario", value: now, inline: false }
                    ],
                    timestamp: new Date()
                }]
            };
            if(tipo === "FINE") {
                embed.embeds[0].fields.push({ name: "Sessione", value: fmt(sessione), inline: true });
                embed.embeds[0].fields.push({ name: "Totale", value: fmt(db[user].ore), inline: true });
            }
            await fetch(DISCORD_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(embed) });
        }
    </script>
</body>
</html>

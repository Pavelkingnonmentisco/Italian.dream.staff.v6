<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDR STAFF PORTAL v21</title>
    <style>
        :root {
            --blue: #007bff;
            --dark: #051e34;
            --danger: #dc3545;
            --accent: #00d4ff;
            --glass: rgba(0, 123, 255, 0.1);
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #012a4a 0%, #000 100%);
        }

        .login-box {
            background: linear-gradient(rgba(5, 30, 52, 0.85), rgba(5, 30, 52, 0.85)), 
                        url('https://res.cloudinary.com/dbxwiln0a/image/upload/v1773153136/xqqtcuahb5q9gxycupvc.gif');
            background-size: cover;
            background-position: center;
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--blue);
            text-align: center;
            width: 360px;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.4);
        }

        /* --- NAVBAR --- */
        nav {
            background: var(--dark);
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            border-bottom: 2px solid var(--blue);
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
        }

        nav button {
            background: var(--glass);
            color: #fff;
            border: 1px solid var(--blue);
            padding: 10px 18px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 10px;
        }

        nav button:hover {
            background: var(--blue);
            box-shadow: 0 0 10px var(--blue);
        }

        .btn-adm { border-color: #f39c12 !important; color: #f39c12 !important; }
        .btn-exit { border-color: var(--danger) !important; color: var(--danger) !important; }

        /* --- LAYOUT --- */
        .container { padding: 30px; max-width: 1100px; margin: auto; text-align: center; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: var(--dark);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card h3 { color: var(--accent); margin: 0; font-size: 11px; text-transform: uppercase; }
        .card p { font-size: 20px; margin: 10px 0; font-weight: bold; }

        .img-header {
            width: 100%;
            max-width: 550px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 1px solid var(--blue);
        }

        /* --- TURNI --- */
        .days-nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .day-btn {
            background: #0a2540;
            border: 1px solid #1a3a5a;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
        }
        .active-day { background: var(--blue); border-color: var(--accent); }

        /* --- TABELLA MATRICOLE --- */
        .m-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: var(--dark);
            border-radius: 10px;
            overflow: hidden;
        }
        .m-table th, .m-table td { padding: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .m-table th { background: var(--blue); text-transform: uppercase; font-size: 12px; }

        /* --- ADMIN --- */
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; text-align: left; }
        .admin-card { background: #0a2540; padding: 25px; border-radius: 15px; border: 1px solid #1a3a5a; }
        .admin-card h3 { margin-top: 0; border-bottom: 1px solid var(--blue); padding-bottom: 10px; font-size: 14px; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--blue);
            border: none;
            color: #fff;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-danger { background: var(--danger); }
        .btn-warn { background: #f39c12; }
        .btn-add { background: #28a745; }

        #timer-val { font-size: 60px; font-weight: 900; margin: 20px 0; display: block; color: #fff; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp" width="80">
            <h2 style="margin:20px 0; letter-spacing: 2px;">STAFF LOGIN</h2>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn-primary" onclick="login()">ACCEDI AL PORTALE</button>
        </div>
    </div>

    <div id="portal" class="hidden">
        <nav>
            <button onclick="tab('area')">Area Personale</button>
            <button onclick="tab('servizio')">Servizio Staff</button>
            <button onclick="tab('turni')">Turni Staff</button>
            <button onclick="tab('matricole')">Lista Matricole</button>
            <button id="adm-btn" class="hidden btn-adm" onclick="tab('admin')">Pannello Staff</button>
            <button onclick="location.reload()" class="btn-exit">Esci</button>
        </nav>

        <div class="container">
            <section id="area">
                <div class="grid">
                    <div class="card"><h3>Grado</h3><p id="u-grado">-</p></div>
                    <div class="card"><h3>Matricola</h3><p id="u-mat">-</p></div>
                    <div class="card"><h3>Ore Totali</h3><p id="u-ore">00:00:00</p></div>
                    <div class="card"><h3>Richiami</h3><p id="u-warns" style="color:red">0</p></div>
                </div>
            </section>

            <section id="servizio" class="hidden">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773150993/dp66lxgcjwmtonwpc9gc.png" class="img-header">
                <div class="card">
                    <span id="timer-val">00:00:00</span>
                    <button id="t-btn" class="btn-primary" onclick="toggleT()">INIZIA SERVIZIO</button>
                </div>
            </section>

            <section id="turni" class="hidden">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773151042/g2bk1uwpi9jybgexnerm.png" class="img-header">
                <div class="days-nav">
                    <button class="day-btn" onclick="showDay('Lunedi', event)">Lunedì</button>
                    <button class="day-btn" onclick="showDay('Martedi', event)">Martedì</button>
                    <button class="day-btn" onclick="showDay('Mercoledi', event)">Mercoledì</button>
                    <button class="day-btn" onclick="showDay('Giovedi', event)">Giovedì</button>
                    <button class="day-btn" onclick="showDay('Venerdi', event)">Venerdì</button>
                    <button class="day-btn" onclick="showDay('Sabato', event)">Sabato</button>
                    <button class="day-btn" onclick="showDay('Domenica', event)">Domenica</button>
                </div>
                <div class="card">
                    <h2 id="day-title" style="color:var(--accent);">Seleziona un giorno</h2>
                    <div class="grid">
                        <div class="card"><h3>Pomeriggio</h3><p id="p-list" style="font-size:14px;">-</p></div>
                        <div class="card"><h3>Sera</h3><p id="s-list" style="font-size:14px;">-</p></div>
                    </div>
                </div>
            </section>

            <section id="matricole" class="hidden">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773154156/epl5g45ywmzfwvd3wytr.png" class="img-header">
                <table class="m-table">
                    <thead><tr><th>Matricola</th><th>Nome</th><th>Grado</th></tr></thead>
                    <tbody id="m-body"></tbody>
                </table>
            </section>

            <section id="admin" class="hidden">
                <div class="admin-grid">
                    <div class="admin-card">
                        <h3>GESTIONE STAFF ESISTENTE</h3>
                        <select id="s-sel" onchange="loadStaffData()"><option value="">Scegli Staffer...</option></select>
                        <input type="text" id="ed-g" placeholder="Grado">
                        <input type="text" id="ed-m" placeholder="Matricola">
                        <input type="number" id="ed-h" placeholder="Secondi di Servizio">
                        <button class="btn-primary" onclick="saveStaffData()">SALVA MODIFICHE</button>
                        <button class="btn-primary btn-danger" onclick="resetOre()">RESET ORE</button>
                    </div>

                    <div class="admin-card">
                        <h3>AGGIUNGI NUOVO MEMBRO</h3>
                        <input type="text" id="new-n" placeholder="Nome Utente">
                        <input type="text" id="new-g" placeholder="Grado">
                        <input type="text" id="new-m" placeholder="Matricola (es. ITD-50)">
                        <input type="text" id="new-p" placeholder="Password Iniziale">
                        <button class="btn-primary btn-add" onclick="addNewStaff()">AGGIUNGI MEMBRO</button>
                    </div>

                    <div class="admin-card">
                        <h3>MODIFICA TURNI</h3>
                        <select id="e-day">
                            <option value="Lunedi">Lunedi</option><option value="Martedi">Martedi</option>
                            <option value="Mercoledi">Mercoledi</option><option value="Giovedi">Giovedi</option>
                            <option value="Venerdi">Venerdi</option><option value="Sabato">Sabato</option>
                            <option value="Domenica">Domenica</option>
                        </select>
                        <textarea id="e-p" placeholder="Pomeriggio..."></textarea>
                        <textarea id="e-s" placeholder="Sera..."></textarea>
                        <button class="btn-primary btn-warn" onclick="saveT()">SALVA TURNI</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const ADM_LIST = ["Daniel", "Michele", "Mav", "Arduino", "Strepitoso", "Archadian", "Djsamy", "Cobra", "Baj", "Mirko", "Maverick", "Pavel", "Diego"];
        
        let db = JSON.parse(localStorage.getItem('ITDR_V21_DB')) || {};
        let tr = JSON.parse(localStorage.getItem('ITDR_V21_TR')) || {
            "Lunedi":{p:"Barone, Hydro, Fabbri", s:"Matz, Nathalino, Viper"},
            "Martedi":{p:"Xenoo, Adamo, Gabriel", s:"Chorno, Joker, Nenne"},
            "Mercoledi":{p:"Mattia, Lollo, Simo", s:"Vortex, Void, Sangue"},
            "Giovedi":{p:"Ibra, Noxen, Ash", s:"Barone, Hydro, Fabbri"},
            "Venerdi":{p:"Matz, Nathalino, Viper", s:"Xenoo, Adamo, Gabriel"},
            "Sabato":{p:"Chorno, Joker, Nenne", s:"Mattia, Lollo, Simo"},
            "Domenica":{p:"Vortex, Void, Sangue", s:"Ibra, Noxen, Ash"}
        };

        if(Object.keys(db).length === 0) {
            const RAW = [
                ["Daniel","Founder","ITD-01"],["Michele","Founder","ITD-02"],["Mav","Co-Founder","ITD-03"],["Arduino","Owner","ITD-04"],
                ["Strepitoso","Co Owner","ITD-05"],["Archadian","Co Owner","ITD-06"],["Djsamy","Community Manager","ITD-07"],["Cobra","Community Manager","ITD-08"],
                ["Baj","Server Supervisor","ITD-09"],["Mirko","Staff Manager","ITD-10"],["Maverick","Staff Manager","ITD-11"],["Pavel","Supervisor","ITD-12"],
                ["Diego","Supervisor","ITD-13"],["Barone","Head Admin","ITD-14"],["Hydro","Head Admin","ITD-15"],["Fabbri","Senior Admin","ITD-16"],
                ["Matz","Senior Admin","ITD-17"],["Nathalino","Senior Admin","ITD-18"],["Viper","Admin","ITD-19"],["Xenoo","Admin","ITD-20"],
                ["Adamo","Head Mod","ITD-21"],["Gabriel","Moderator","ITD-22"],["Chorno","Moderator","ITD-23"],["Joker","Moderator","ITD-24"],
                ["Nenne","Trial Mod","ITD-25"],["Mattia","Trial Mod","ITD-26"],["Lollo","Senior Helper","ITD-27"],["Simo","Helper","ITD-28"],
                ["Vortex","Helper","ITD-29"],["Void","Helper","ITD-30"],["Sangue","Trial Helper","ITD-31"],["Ibra","Trial Helper","ITD-32"],["Noxen","Trial Helper","ITD-33"],["Ash","Trial Helper","ITD-34"]
            ];
            RAW.forEach(s => { db[s[0]] = { pass: s[0]+"-01", grado: s[1], mat: s[2], ore: 0, warns: 0 }; });
            save();
        }

        let user = null; let sec = 0; let interval = null; let on = false;

        function login() {
            let u = document.getElementById('user-in').value.trim();
            let p = document.getElementById('pass-in').value.trim();
            if(db[u] && db[u].pass === p) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                if(ADM_LIST.includes(u)) { document.getElementById('adm-btn').classList.remove('hidden'); refreshAdmList(); }
                updateArea(); renderMatricole();
            } else alert("Credenziali errate!");
        }

        function updateArea() {
            document.getElementById('u-grado').innerText = db[user].grado;
            document.getElementById('u-mat').innerText = db[user].mat;
            document.getElementById('u-ore').innerText = fmt(db[user].ore);
            document.getElementById('u-warns').innerText = db[user].warns;
        }

        function addNewStaff() {
            let n = document.getElementById('new-n').value.trim();
            let g = document.getElementById('new-g').value.trim();
            let m = document.getElementById('new-m').value.trim();
            let p = document.getElementById('new-p').value.trim();

            if(!n || !g || !m || !p) return alert("Compila tutti i campi!");
            if(db[n]) return alert("Questo nome esiste già!");

            db[n] = { pass: p, grado: g, mat: m, ore: 0, warns: 0 };
            save();
            refreshAdmList();
            renderMatricole();
            alert("Membro aggiunto con successo!");
            
            document.getElementById('new-n').value = "";
            document.getElementById('new-g').value = "";
            document.getElementById('new-m').value = "";
            document.getElementById('new-p').value = "";
        }

        function loadStaffData() {
            let s = document.getElementById('s-sel').value;
            if(!s) return;
            document.getElementById('ed-g').value = db[s].grado;
            document.getElementById('ed-m').value = db[s].mat;
            document.getElementById('ed-h').value = db[s].ore;
        }

        function saveStaffData() {
            let s = document.getElementById('s-sel').value;
            if(!s) return;
            db[s].grado = document.getElementById('ed-g').value;
            db[s].mat = document.getElementById('ed-m').value;
            db[s].ore = parseInt(document.getElementById('ed-h').value);
            save(); renderMatricole(); if(s === user) updateArea();
            alert("Dati aggiornati!");
        }

        function resetOre() {
            let s = document.getElementById('s-sel').value;
            if(confirm("Vuoi azzerare le ore di "+s+"?")) { db[s].ore = 0; save(); loadStaffData(); if(s === user) updateArea(); }
        }

        function saveT() {
            let d = document.getElementById('e-day').value;
            tr[d] = { p: document.getElementById('e-p').value, s: document.getElementById('e-s').value };
            save(); alert("Turni salvati!");
        }

        function showDay(d, e) {
            document.getElementById('day-title').innerText = d;
            document.getElementById('p-list').innerText = tr[d].p;
            document.getElementById('s-list').innerText = tr[d].s;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active-day'));
            e.target.classList.add('active-day');
        }

        function renderMatricole() {
            let b = document.getElementById('m-body');
            const sorted = Object.keys(db).sort((x,y) => db[x].mat.localeCompare(db[y].mat, undefined, {numeric: true}));
            b.innerHTML = sorted.map(k => `<tr><td>${db[k].mat}</td><td>${k}</td><td>${db[k].grado}</td></tr>`).join('');
        }

        function refreshAdmList() {
            let s = document.getElementById('s-sel');
            s.innerHTML = '<option value="">Scegli Staffer...</option>';
            Object.keys(db).sort().forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
        }

        function toggleT() {
            let b = document.getElementById('t-btn');
            if(!on) {
                on = true; b.innerText = "FINE SERVIZIO"; b.classList.add('btn-danger');
                interval = setInterval(() => { sec++; document.getElementById('timer-val').innerText = fmt(sec); }, 1000);
            } else {
                on = false; b.innerText = "INIZIA SERVIZIO"; b.classList.remove('btn-danger');
                clearInterval(interval); db[user].ore += sec; sec = 0; save(); updateArea();
                document.getElementById('timer-val').innerText = "00:00:00";
            }
        }

        function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
        function save() { 
            localStorage.setItem('ITDR_V21_DB', JSON.stringify(db)); 
            localStorage.setItem('ITDR_V21_TR', JSON.stringify(tr)); 
        }
        function tab(id) {
            ["area", "servizio", "turni", "matricole", "admin"].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>

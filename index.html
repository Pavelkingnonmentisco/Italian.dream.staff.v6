<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDR STAFF PORTAL | 2026</title>
    <style>
        :root {
            --accent: #FFD700;
            --bg-dark: #050505;
            --card-bg: #111111; 
            --text: #ffffff;
            --danger: #ff4d4d;
        }

        body {
            background: var(--bg-dark);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* --- NAVBAR COMPATTA --- */
        nav {
            background: #000;
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo { height: 35px; border-radius: 50%; }
        .nav-links button {
            background: transparent; color: #bbb; border: none;
            padding: 8px 12px; cursor: pointer; font-weight: 600;
            text-transform: uppercase; font-size: 11px; transition: 0.3s;
        }
        .nav-links button:hover { color: var(--accent); }

        /* --- BANNER STRETTI E LARGHI (BANNER SLIM) --- */
        .banner-wrapper {
            width: 100%;
            background: #000;
            border-bottom: 1px solid #222;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .section-banner {
            width: 100%;
            max-width: 1400px;
            max-height: 180px; /* Altezza limitata per non coprire tutto */
            object-fit: cover; /* Taglia l'immagine per farla stare nella fascia */
            object-position: center;
            filter: brightness(0.8);
        }

        /* --- CONTENUTO --- */
        .container { 
            width: 95%;
            max-width: 1200px; 
            margin: 20px auto; 
            flex: 1;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 15px; 
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #222;
            transition: 0.3s;
        }
        
        .card:hover { border-color: var(--accent); }
        .card h3 { color: #666; margin: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .card p { font-size: 22px; margin: 8px 0; font-weight: 700; color: #fff; }

        /* --- TABELLA MATRICOLE --- */
        .m-table { 
            width: 100%; 
            border-collapse: collapse; 
            background: var(--card-bg); 
            font-size: 13px;
        }
        .m-table th { background: #1a1a1a; color: var(--accent); padding: 12px; text-align: left; text-transform: uppercase; font-size: 11px; }
        .m-table td { padding: 10px 12px; border-bottom: 1px solid #222; }
        .m-table tr:nth-child(even) { background: #151515; }

        /* --- TIMER --- */
        #timer-val { 
            font-size: 60px; font-weight: 900; color: #fff; 
            display: block; margin: 15px 0;
            font-family: monospace;
        }

        input, select, textarea { 
            width: 100%; padding: 10px; margin: 5px 0; 
            background: #111; border: 1px solid #333; color: #fff; border-radius: 4px; font-size: 13px;
        }
        
        .btn-primary { 
            width: 100%; padding: 12px; background: var(--accent); color: #000; 
            border: none; font-weight: 800; border-radius: 4px; cursor: pointer; 
            text-transform: uppercase; font-size: 14px;
        }

        #login-screen {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #000;
        }

        footer { padding: 20px; text-align: center; color: #333; font-size: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align:center; width: 300px; background: #111; padding: 40px; border-radius: 10px; border: 1px solid #222;">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp" width="70">
            <h1 style="font-size: 16px; letter-spacing: 2px; margin: 15px 0;">STAFF ACCESS</h1>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn-primary" onclick="login()">Login</button>
        </div>
    </div>

    <div id="portal" class="hidden">
        <nav>
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif" class="nav-logo">
                <span style="font-weight: 800; font-size: 13px; letter-spacing: 1px;">ITDR PORTAL</span>
            </div>
            <div class="nav-links">
                <button onclick="tab('area')">Dashboard</button>
                <button onclick="tab('servizio')">Duty</button>
                <button onclick="tab('turni')">Orari</button>
                <button onclick="tab('matricole')">Matricole</button>
                <button id="adm-btn" class="hidden" style="color:var(--accent)" onclick="tab('admin')">Admin</button>
                <button onclick="location.reload()" style="color:var(--danger)">Esci</button>
            </div>
        </nav>

        <section id="area">
            <div class="banner-wrapper">
                <img src="https://i.ibb.co/39QGy4NM/Area-Personale.png" class="section-banner">
            </div>
            <div class="container">
                <div class="grid">
                    <div class="card"><h3>Grado</h3><p id="u-grado">-</p></div>
                    <div class="card"><h3>Matricola</h3><p id="u-mat">-</p></div>
                    <div class="card"><h3>Ore Totali</h3><p id="u-ore">00:00:00</p></div>
                    <div class="card"><h3>Sanzioni</h3><p id="u-warns" style="color:var(--danger)">0</p></div>
                </div>
            </div>
        </section>

        <section id="servizio" class="hidden">
            <div class="banner-wrapper">
                <img src="https://i.ibb.co/hxJ3wNy9/Duty-Staff.png" class="section-banner">
            </div>
            <div class="container" style="text-align: center;">
                <div class="card" style="max-width: 500px; margin: auto; border-top: 3px solid var(--accent); border-left: none;">
                    <h3>Sessione Attiva</h3>
                    <span id="timer-val">00:00:00</span>
                    <div style="display:flex; gap:10px;">
                        <button id="t-btn" class="btn-primary" onclick="toggleT()">Start</button>
                        <button id="p-btn" class="btn-primary hidden" style="background:#333; color:#fff;" onclick="togglePause()">Pausa</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="turni" class="hidden">
            <div class="banner-wrapper">
                <img src="https://i.ibb.co/bgY9swvP/Calendario-Turni.png" class="section-banner">
            </div>
            <div class="container">
                <div class="card" style="margin-bottom: 15px;">
                    <select id="view-day" onchange="showDay(this.value)" style="margin:0;">
                        <option value="">Scegli Giorno...</option>
                        <option value="Lunedi">Lunedì</option><option value="Martedi">Martedì</option><option value="Mercoledi">Mercoledì</option><option value="Giovedi">Giovedì</option><option value="Venerdi">Venerdì</option><option value="Sabato">Sabato</option><option value="Domenica">Domenica</option>
                    </select>
                </div>
                <div class="grid">
                    <div class="card"><h3>Pomeriggio</h3><p id="p-list" style="font-size:15px; color:var(--accent);">-</p></div>
                    <div class="card"><h3>Sera</h3><p id="s-list" style="font-size:15px; color:var(--accent);">-</p></div>
                </div>
            </div>
        </section>

        <section id="matricole" class="hidden">
            <div class="container">
                <div style="background: #111; padding: 15px; border-radius: 8px; border: 1px solid #222;">
                    <h3 style="color:var(--accent); margin-bottom: 15px; font-size: 12px; letter-spacing: 2px;">REGISTRO UFFICIALE STAFF</h3>
                    <table class="m-table">
                        <thead><tr><th>MAT.</th><th>NOME</th><th>GRADO</th><th>WARN</th></tr></thead>
                        <tbody id="m-body"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="admin" class="hidden">
            <div class="container">
                <div class="grid">
                    <div class="card">
                        <h3>Edit Staff</h3>
                        <select id="s-sel" onchange="loadStaffData()"><option value="">Seleziona...</option></select>
                        <input type="text" id="ed-g" placeholder="Grado">
                        <input type="text" id="ed-m" placeholder="Matricola">
                        <input type="number" id="ed-h" placeholder="Secondi">
                        <button class="btn-primary" onclick="saveStaffData()">Salva</button>
                    </div>
                    <div class="card">
                        <h3>Edit Orari</h3>
                        <select id="e-day">
                            <option value="Lunedi">Lunedì</option><option value="Martedi">Martedì</option><option value="Mercoledi">Mercoledì</option><option value="Giovedi">Giovedì</option><option value="Venerdi">Venerdì</option><option value="Sabato">Sabato</option><option value="Domenica">Domenica</option>
                        </select>
                        <textarea id="e-p" placeholder="Pomeriggio..."></textarea>
                        <textarea id="e-s" placeholder="Sera..."></textarea>
                        <button class="btn-primary" onclick="saveT()">Aggiorna</button>
                    </div>
                </div>
            </div>
        </section>

        <footer>ITDR OFFICIAL • 2026</footer>
    </div>

    <script>
        const ADM_LIST = ["Daniel", "Michele", "Mav", "Arduino", "Strepitoso", "Archadian", "Djsamy", "Cobra", "Baj", "Mirko", "Maverick", "Pavel", "Diego", "Barone", "Hydro"];
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1480953347941990512/tO72Y7nUOLn0atj93WQfdwrpvOw1213-opTl7hBTmunCVvht4Ck6lJcvb_7GPm-ZcLmr";

        let db = JSON.parse(localStorage.getItem('ITDR_V41_DB')) || {};
        let tr = JSON.parse(localStorage.getItem('ITDR_V41_TR')) || { "Lunedi":{p:"-",s:"-"}, "Martedi":{p:"-",s:"-"}, "Mercoledi":{p:"-",s:"-"}, "Giovedi":{p:"-",s:"-"}, "Venerdi":{p:"-",s:"-"}, "Sabato":{p:"-",s:"-"}, "Domenica":{p:"-",s:"-"} };

        if(Object.keys(db).length === 0) {
            const STAFF = [
                ["Daniel","Founder","ITD-01"],["Michele","Founder","ITD-02"],["Mav","Co-Founder","ITD-03"],["Arduino","Owner","ITD-04"],["Strepitoso","Co Owner","ITD-05"],["Archadian","Co Owner","ITD-06"],["Djsamy","Community Manager","ITD-07"],["Cobra","Community Manager","ITD-08"],["Baj","Server Supervisor","ITD-09"],["Mirko","Staff Manager","ITD-10"],["Maverick","Staff Manager","ITD-11"],["Pavel","Supervisor","ITD-12"],["Diego","Supervisor","ITD-13"],["Barone","Head Admin","ITD-14"],["Hydro","Head Admin","ITD-15"],["Fabbri","Senior Admin","ITD-16"],["Matz","Senior Admin","ITD-17"],["Nathalino","Senior Admin","ITD-18"],["Viper","Admin","ITD-19"],["Xenoo","Admin","ITD-20"],["Adamo","Head Mod","ITD-21"],["Nano","Moderator","ITD-22"],["Gabriel","Moderator","ITD-23"],["Chorno","Moderator","ITD-24"],["Joker","Moderator","ITD-25"],["Nenne","Trial Mod","ITD-26"],["Mattia","Trial Mod","ITD-27"],["Lollo","Senior Helper","ITD-28"],["Simo","Helper","ITD-29"],["Vortex","Helper","ITD-30"],["Void","Helper","ITD-31"],["Sangue","Trial Helper","ITD-32"],["Ibra","Trial Helper","ITD-33"],["Noxen","Trial Helper","ITD-34"],["Ash","Trial Helper","ITD-35"],["Pietro","Trial Helper","ITD-36"]
            ];
            STAFF.forEach(s => { db[s[0]] = { pass: s[0]+"-01", grado: s[1], mat: s[2], ore: 0, warns: 0 }; });
            save();
        }

        let user = null, sec = 0, interval = null, on = false, isPaused = false;

        function login() {
            let u = document.getElementById('user-in').value.trim();
            let p = document.getElementById('pass-in').value.trim();
            if(db[u] && db[u].pass === p) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                if(ADM_LIST.includes(u)) { document.getElementById('adm-btn').classList.remove('hidden'); refreshAdmList(); }
                updateArea(); renderMatricole();
            } else alert("Dati errati");
        }

        async function sendLog(tipo, sessione = 0) {
            if(!DISCORD_WEBHOOK) return;
            const now = new Date();
            let color = tipo === "INIZIO" ? 16766720 : 16711680;
            let description = tipo === "INIZIO" ? 
                `📥 **ENTRATA IN SERVIZIO – STAFF**\n👤 Operatore: <@${db[user].mat.replace('ITD-', '')}>\n🆔 ID Operatore: ${db[user].mat}\n🏷️ Ruolo: ${db[user].grado}\n⏰ Orario Entrata: ${now.toLocaleString('it-IT')}` :
                `📤 **USCITA DAL SERVIZIO – STAFF**\n👤 Operatore: <@${db[user].mat.replace('ITD-', '')}>\n🆔 ID Operatore: ${db[user].mat}\n🏷️ Ruolo: ${db[user].grado}\n⏰ Orario Uscita: ${now.toLocaleString('it-IT')}\n⏳ Durata Totale: ${fmt(sessione)}`;

            fetch(DISCORD_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ embeds: [{ description, color, timestamp: new Date() }] }) });
        }

        function toggleT() {
            let b = document.getElementById('t-btn');
            let pBtn = document.getElementById('p-btn');
            if(!on) {
                on = true; b.innerText = "Stop"; b.style.background = "var(--danger)";
                pBtn.classList.remove('hidden'); startTimer(); sendLog("INIZIO");
            } else {
                on = false; b.innerText = "Start"; b.style.background = "var(--accent)";
                pBtn.classList.add('hidden'); clearInterval(interval);
                db[user].ore += sec; sendLog("FINE", sec);
                sec = 0; document.getElementById('timer-val').innerText = "00:00:00";
                save(); updateArea();
            }
        }

        function startTimer() { interval = setInterval(() => { sec++; document.getElementById('timer-val').innerText = fmt(sec); }, 1000); }
        function togglePause() {
            let pBtn = document.getElementById('p-btn');
            if(!isPaused) { isPaused = true; clearInterval(interval); pBtn.innerText = "Riprendi"; }
            else { isPaused = false; startTimer(); pBtn.innerText = "Pausa"; }
        }

        function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
        function save() { localStorage.setItem('ITDR_V41_DB', JSON.stringify(db)); localStorage.setItem('ITDR_V41_TR', JSON.stringify(tr)); }
        function tab(id) {
            ["area", "servizio", "turni", "matricole", "admin"].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
        function showDay(d) { if(d) { document.getElementById('p-list').innerText = tr[d].p; document.getElementById('s-list').innerText = tr[d].s; } }
        function renderMatricole() {
            let b = document.getElementById('m-body');
            const sorted = Object.keys(db).sort((x,y) => db[x].mat.localeCompare(db[y].mat, undefined, {numeric: true}));
            b.innerHTML = sorted.map(k => `<tr><td><b>${db[k].mat}</b></td><td>${k}</td><td>${db[k].grado}</td><td>${db[k].warns || 0}</td></tr>`).join('');
        }
        function updateArea() {
            document.getElementById('u-grado').innerText = db[user].grado;
            document.getElementById('u-mat').innerText = db[user].mat;
            document.getElementById('u-ore').innerText = fmt(db[user].ore);
            document.getElementById('u-warns').innerText = db[user].warns || 0;
        }
        function refreshAdmList() {
            let s = document.getElementById('s-sel'); s.innerHTML = '<option value="">Staff...</option>';
            Object.keys(db).sort().forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
        }
        function loadStaffData() {
            let s = document.getElementById('s-sel').value; if(!s) return;
            document.getElementById('ed-g').value = db[s].grado;
            document.getElementById('ed-m').value = db[s].mat;
            document.getElementById('ed-h').value = db[s].ore;
        }
        function saveStaffData() {
            let s = document.getElementById('s-sel').value; if(!s) return;
            db[s].grado = document.getElementById('ed-g').value;
            db[s].mat = document.getElementById('ed-m').value;
            db[s].ore = parseInt(document.getElementById('ed-h').value);
            save(); renderMatricole(); alert("Ok!");
        }
        function saveT() {
            let d = document.getElementById('e-day').value;
            tr[d] = { p: document.getElementById('e-p').value, s: document.getElementById('e-s').value };
            save(); alert("Ok!");
        }
    </script>
</body>
</html>

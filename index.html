<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Staff Panel RP - Melonly Style</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #020617;
            --panel: #0F172A;
            --primary: #38BDF8;
            --primary-dark: #0EA5E9;
            --text: #E5E7EB;
            --muted: #94A3B8;
            --border: rgba(56,189,248,0.25);
            --glow: rgba(56,189,248,0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Poppins", system-ui, sans-serif;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        /* LOGIN */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, rgba(56,189,248,0.15), transparent 60%), var(--bg);
        }

        .login-card {
            background: var(--panel);
            padding: 32px;
            width: 380px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 0 40px rgba(15,23,42,0.9);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.6s ease;
        }

        .login-card::before {
            content: "";
            position: absolute;
            inset: -40%;
            background: radial-gradient(circle at top, var(--glow), transparent 60%);
            opacity: 0.4;
            pointer-events: none;
        }

        .login-inner { position: relative; z-index: 1; }
        
        .login-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .login-logo img {
            height: 60px;
            object-fit: contain;
        }

        .login-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
            text-shadow: 0 0 15px var(--glow);
        }

        .login-subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 14px; }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #CBD5E1;
            margin-bottom: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #1E293B;
            background: #020617;
            color: var(--text);
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--glow);
        }

        .btn-primary {
            width: 100%;
            padding: 11px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #0F172A;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px var(--glow);
            transform: translateY(-1px);
        }

        .error-box {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            padding: 8px 10px;
            border-radius: 10px;
            color: #FCA5A5;
            font-size: 0.8rem;
            margin-bottom: 10px;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* APP LAYOUT */
        .app-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            width: 100%;
            height: 70px;
            background: #020617;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 0 25px rgba(15,23,42,0.9);
        }

        .navbar-inner {
            display: flex;
            gap: 18px;
            align-items: center;
            background: rgba(15,23,42,0.9);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            backdrop-filter: blur(14px);
        }

        .navbar-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 10px;
            padding-right: 10px;
            border-right: 1px solid rgba(148,163,184,0.4);
        }

        .navbar-logo img { height: 32px; object-fit: contain; }
        .navbar-logo span { font-size: 0.9rem; font-weight: 600; color: var(--primary); }

        .nav-item {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .nav-item:hover { color: var(--primary); transform: translateY(-1px); }
        .nav-item.active {
            color: var(--primary);
            background: rgba(56,189,248,0.12);
            box-shadow: 0 0 15px rgba(56,189,248,0.25);
        }

        main { flex: 1; padding: 20px; max-width: 1400px; margin: 0 auto 30px; }
        .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
            text-shadow: 0 0 12px var(--glow);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--panel);
            border-radius: 18px;
            border: 1px solid var(--border);
            padding: 18px 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-number { font-size: 2rem; font-weight: 700; text-shadow: 0 0 10px var(--glow); }

        /* Form styling */
        .field-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 3px; display:block; }
        .field-input, .field-textarea, .field-select {
            width: 100%;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid #1E293B;
            background: #020617;
            color: var(--text);
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .btn-small {
            padding: 7px 12px;
            border-radius: 999px;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            background: #1E293B;
            color: white;
            transition: 0.2s;
        }

        .btn-small.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #0F172A;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #1E293B;
            background: #020617;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px; border-bottom: 1px solid #111827; text-align: left; }
        th { color: var(--muted); text-transform: uppercase; font-size: 0.7rem; }

        .badge {
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 0.7rem;
            border: 1px solid #4B5563;
        }
        .badge.admin { border-color: #f97316; color: #fed7aa; }
        .badge.mod { border-color: #3b82f6; color: #bfdbfe; }
        .badge.helper { border-color: #a855f7; color: #e9d5ff; }
    </style>
</head>
<body>

<div id="login-view" class="login-wrapper">
    <div class="login-card">
        <div class="login-inner">
            <div class="login-logo">
                <img src="https://res.cloudinary.com/dec4vnmzg/image/upload/v1775515801/rjmv1dsam6nqf1jfmnfw.webp" alt="Logo">
            </div>
            <div class="login-title">Staff Panel RP</div>
            <div class="login-subtitle">Accedi con il tuo account staff</div>
            <div id="login-error" class="error-box"></div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="login-username" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password">
            </div>
            <button class="btn-primary" id="login-btn">Entra</button>
        </div>
    </div>
</div>

<div id="app-view" class="app-wrapper hidden">
    <div class="navbar">
        <div class="navbar-inner">
            <div class="navbar-logo">
                <img src="https://res.cloudinary.com/dec4vnmzg/image/upload/v1775515801/rjmv1dsam6nqf1jfmnfw.webp" alt="Logo">
                <span>Staff Panel</span>
            </div>
            <div class="nav-item active" data-section="dashboard">📊 Dashboard</div>
            <div class="nav-item" data-section="personal">👤 Area Personale</div>
            <div class="nav-item" data-section="duty">🕒 Duty</div>
            <div class="nav-item" data-section="logs">📁 Logs</div>
            <div class="nav-item" data-section="staff-manager">🛡️ Staff Manager</div>
            <div class="nav-item" id="logout-btn">🚪 Logout</div>
        </div>
    </div>

    <main>
        <section id="dashboard-section" class="panel-section">
            <div class="section-title">Dashboard</div>
            <div class="grid">
                <div class="card">
                    <div class="card-title">Staff Online</div>
                    <div class="stat-number" id="stat-staff-online">0</div>
                </div>
                <div class="card">
                    <div class="card-title">Logs Totali</div>
                    <div class="stat-number" id="stat-total-logs">0</div>
                </div>
                <div class="card">
                    <canvas id="hoursChart" height="120"></canvas>
                </div>
            </div>
        </section>

        <section id="logs-section" class="panel-section hidden">
            <div class="section-title">Crea Punishment Log</div>
            <div class="card" style="max-width: 500px;">
                <label class="field-label">User *</label>
                <input class="field-input" id="log-user">
                <label class="field-label">Reason *</label>
                <textarea class="field-textarea" id="log-reason"></textarea>
                <label class="field-label">Type</label>
                <select class="field-select" id="log-type">
                    <option value="Warning">Warning</option>
                    <option value="Kick">Kick</option>
                    <option value="Ban">Ban</option>
                </select>
                <button class="btn-small primary" id="log-create-btn">Crea Log</button>
            </div>
        </section>
        
        <section id="staff-manager-section" class="panel-section hidden">
            <div class="section-title">Staff Manager</div>
            <div id="staff-manager-locked" class="card" style="max-width:400px;">
                <label class="field-label">Password Admin</label>
                <input class="field-input" type="password" id="sm-password">
                <button class="btn-small primary" id="sm-unlock-btn">Sblocca</button>
                <div id="sm-error" class="error-box" style="margin-top:10px;"></div>
            </div>
            <div id="staff-manager-unlocked" class="hidden">
                 <div class="table-wrapper">
                    <table id="sm-staff-table">
                        <thead>
                            <tr><th>Username</th><th>Ruolo</th><th>Ore</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                 </div>
            </div>
        </section>
    </main>
</div>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = {
    databaseURL: "https://staffpanelrp-default-rtdb.europe-west1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const bcrypt = dcodeIO.bcrypt; // FIX: Accesso corretto alla libreria bcryptjs

let currentUser = null;

/* LOGIN LOGIC */
const loginBtn = document.getElementById("login-btn");
loginBtn.addEventListener("click", async () => {
    const user = document.getElementById("login-username").value.trim();
    const pass = document.getElementById("login-password").value;
    const errBox = document.getElementById("login-error");

    if (!user || !pass) {
        errBox.textContent = "Inserisci tutti i campi.";
        errBox.style.display = "block";
        return;
    }

    try {
        const snap = await db.ref("staff/" + user).get();
        if (!snap.exists()) {
            errBox.textContent = "Utente non trovato.";
            errBox.style.display = "block";
            return;
        }

        const data = snap.val();
        // Verifica la password usando bcrypt
        const match = bcrypt.compareSync(pass, data.passwordHash);

        if (match) {
            currentUser = user;
            document.getElementById("login-view").classList.add("hidden");
            document.getElementById("app-view").classList.remove("hidden");
            initApp();
        } else {
            errBox.textContent = "Password errata.";
            errBox.style.display = "block";
        }
    } catch (e) {
        console.error(e);
        errBox.textContent = "Errore durante il login (Bcrypt/DB).";
        errBox.style.display = "block";
    }
});

/* NAVBAR NAVIGATION */
document.querySelectorAll(".nav-item").forEach(item => {
    item.addEventListener("click", () => {
        const section = item.getAttribute("data-section");
        if (!section) return;
        
        document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
        item.classList.add("active");
        
        document.querySelectorAll(".panel-section").forEach(s => s.classList.add("hidden"));
        document.getElementById(section + "-section").classList.remove("hidden");
    });
});

document.getElementById("logout-btn").addEventListener("click", () => { location.reload(); });

/* INIT APP FUNCTIONS */
function initApp() {
    setupDashboard();
    // Altre inizializzazioni...
}

function setupDashboard() {
    db.ref("staff").on("value", snap => {
        let online = 0;
        snap.forEach(s => { if(s.val().dutyStatus === "online") online++; });
        document.getElementById("stat-staff-online").textContent = online;
    });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDR STAFF PORTAL v28 | 2026</title>
    <style>
        :root {
            --blue: #007bff;
            --dark: #051e34;
            --danger: #dc3545;
            --accent: #00d4ff;
            --glass: rgba(0, 123, 255, 0.1);
            --neon: 0 0 15px var(--accent);
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- LOGIN --- */
        #login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://res.cloudinary.com/dbxwiln0a/image/upload/v1773154953/eb3pca3vvbnearhoockt.webp');
            background-size: cover;
            background-position: center;
        }

        .login-box {
            background: rgba(5, 30, 52, 0.95);
            padding: 40px;
            border-radius: 5px;
            border-left: 5px solid var(--blue);
            text-align: center;
            width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* --- NAVBAR --- */
        nav {
            background: rgba(5, 30, 52, 0.9);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--blue);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-logo { height: 45px; width: 45px; border-radius: 50%; border: 1px solid var(--accent); box-shadow: var(--neon); }
        .nav-links { display: flex; gap: 15px; }

        .nav-links button {
            background: none;
            border: none;
            color: #aaa;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links button:hover { color: var(--accent); text-shadow: var(--neon); }

        /* --- TASTI TURNI 2026 (RE-DESIGN) --- */
        .turni-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .day-btn {
            background: transparent;
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            padding: 12px 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .day-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .day-btn:hover {
            color: #fff;
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.05);
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .day-btn:hover::before { left: 100%; }

        .day-btn.active-day {
            color: #fff;
            border-color: var(--accent);
            background: var(--blue);
            box-shadow: var(--neon);
            transform: translateY(-2px);
        }

        /* --- LAYOUT --- */
        .container { padding: 40px 20px; max-width: 1200px; margin: auto; text-align: center; flex: 1; }
        .img-header { width: 100%; max-width: 600px; border-radius: 4px; margin-bottom: 40px; filter: grayscale(20%) contrast(110%); border-bottom: 3px solid var(--blue); }

        .card { background: #0a0a0a; padding: 30px; border: 1px solid #1a1a1a; border-radius: 4px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; }

        .m-table { width: 100%; border-collapse: collapse; background: #0a0a0a; border: 1px solid #1a1a1a; }
        .m-table th { background: #111; color: var(--accent); padding: 20px; text-align: left; font-size: 11px; letter-spacing: 2px; border-bottom: 2px solid var(--blue); }
        .m-table td { padding: 15px 20px; border-bottom: 1px solid #1a1a1a; font-size: 14px; color: #ccc; }

        /* --- FOOTER --- */
        footer {
            padding: 30px;
            background: #050505;
            border-top: 1px solid #1a1a1a;
            color: #444;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-primary { 
            background: var(--blue); color: #fff; border: none; padding: 15px; 
            font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-primary:hover { background: var(--accent); box-shadow: var(--neon); }

        #timer-val { font-size: 80px; font-weight: 200; letter-spacing: -2px; color: var(--accent); text-shadow: var(--neon); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp" width="70">
            <h2 style="font-weight: 200; letter-spacing: 5px;">LOGIN</h2>
            <input type="text" id="user-in" placeholder="OPERATORE">
            <input type="password" id="pass-in" placeholder="PASSWORD">
            <button class="btn-primary" onclick="login()">AUTENTICAZIONE</button>
            <p style="font-size: 9px; margin-top: 20px; color: #555;">SECURITY PORTAL v28.0.26</p>
        </div>
    </div>

    <div id="portal" class="hidden">
        <nav>
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif" class="nav-logo">
            <div class="nav-links">
                <button onclick="tab('area')">Dashboard</button>
                <button onclick="tab('servizio')">Servizio</button>
                <button onclick="tab('turni')">Turni</button>
                <button onclick="tab('matricole')">Database</button>
                <button id="adm-btn" class="hidden" style="color:#f39c12" onclick="tab('admin')">Admin</button>
                <button onclick="location.reload()" style="color:var(--danger)">Logout</button>
            </div>
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif" class="nav-logo">
        </nav>

        <div class="container">
            <section id="area">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773154806/xtb9kcfg5ian3x9fiq9w.gif" class="img-header">
                <div class="grid">
                    <div class="card"><h3>Qualifica</h3><p id="u-grado">-</p></div>
                    <div class="card"><h3>ID Operatore</h3><p id="u-mat">-</p></div>
                    <div class="card"><h3>Totalizzatore Ore</h3><p id="u-ore">00:00:00</p></div>
                </div>
            </section>

            <section id="turni" class="hidden">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773151042/g2bk1uwpi9jybgexnerm.png" class="img-header">
                
                <div class="turni-container">
                    <button class="day-btn" onclick="showDay('Lunedi', event)">Lun</button>
                    <button class="day-btn" onclick="showDay('Martedi', event)">Mar</button>
                    <button class="day-btn" onclick="showDay('Mercoledi', event)">Mer</button>
                    <button class="day-btn" onclick="showDay('Giovedi', event)">Gio</button>
                    <button class="day-btn" onclick="showDay('Venerdi', event)">Ven</button>
                    <button class="day-btn" onclick="showDay('Sabato', event)">Sab</button>
                    <button class="day-btn" onclick="showDay('Domenica', event)">Dom</button>
                </div>

                <div class="card">
                    <h2 id="day-title" style="font-weight: 200; color: var(--accent);">Selezionare Turno</h2>
                    <div class="grid">
                        <div class="card" style="border-top: 2px solid var(--blue);">
                            <span style="color: #555; font-size: 11px;">UNITÀ POMERIGGIO</span>
                            <p id="p-list" style="font-size: 16px;">-</p>
                        </div>
                        <div class="card" style="border-top: 2px solid var(--blue);">
                            <span style="color: #555; font-size: 11px;">UNITÀ SERA</span>
                            <p id="s-list" style="font-size: 16px;">-</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="servizio" class="hidden">
                <div class="card">
                    <span id="timer-val">00:00:00</span><br><br>
                    <button id="t-btn" class="btn-primary" style="max-width:200px" onclick="toggleT()">AVVIA SESSIONE</button>
                </div>
            </section>

            <section id="matricole" class="hidden">
                <table class="m-table">
                    <thead><tr><th>ID</th><th>NOME</th><th>GRADO</th></tr></thead>
                    <tbody id="m-body"></tbody>
                </table>
            </section>

            <section id="admin" class="hidden">
                <div class="grid">
                    <div class="card">
                        <h3>MODIFICA STAFF</h3>
                        <select id="s-sel" onchange="loadStaffData()"></select>
                        <input type="text" id="ed-g" placeholder="Grado">
                        <input type="number" id="ed-h" placeholder="Secondi">
                        <button class="btn-primary" onclick="saveStaffData()">SALVA</button>
                    </div>
                </div>
            </section>
        </div>

        <footer>
            © 2026 ITDR SYSTEM | SECURE ACCESS | DESIGNED BY PAVEL
        </footer>
    </div>

    <script>
        // Logica 2026 - Diego rimosso come richiesto
        const ADM_LIST = ["Daniel", "Michele", "Mav", "Arduino", "Strepitoso", "Archadian", "Djsamy", "Cobra", "Baj", "Mirko", "Maverick", "Pavel"];
        let db = JSON.parse(localStorage.getItem('ITDR_V28_DB')) || {};
        let tr = JSON.parse(localStorage.getItem('ITDR_V28_TR')) || {
            "Lunedi":{p:"Barone, Hydro, Fabbri", s:"Matz, Nathalino, Viper"},
            "Martedi":{p:"Xenoo, Adamo, Gabriel", s:"Chorno, Joker, Nenne"},
            "Mercoledi":{p:"Mattia, Lollo, Simo", s:"Vortex, Void, Sangue"},
            "Giovedi":{p:"Ibra, Noxen, Ash", s:"Barone, Hydro, Fabbri"},
            "Venerdi":{p:"Matz, Nathalino, Viper", s:"Xenoo, Adamo, Gabriel"},
            "Sabato":{p:"Chorno, Joker, Nenne", s:"Mattia, Lollo, Simo"},
            "Domenica":{p:"Vortex, Void, Sangue", s:"Ibra, Noxen, Ash"}
        };

        if(Object.keys(db).length === 0) {
            const RAW = [["Daniel","Founder","ITD-01"],["Michele","Founder","ITD-02"],["Mav","Co-Founder","ITD-03"],["Arduino","Owner","ITD-04"],["Strepitoso","Co Owner","ITD-05"],["Archadian","Co Owner","ITD-06"],["Djsamy","Community Manager","ITD-07"],["Cobra","Community Manager","ITD-08"],["Baj","Server Supervisor","ITD-09"],["Mirko","Staff Manager","ITD-10"],["Maverick","Staff Manager","ITD-11"],["Pavel","Supervisor","ITD-12"],["Diego","Supervisor","ITD-13"]];
            RAW.forEach(s => { db[s[0]] = { pass: s[0]+"-01", grado: s[1], mat: s[2], ore: 0, warns: 0 }; });
            save();
        }

        let user = null; let sec = 0; let interval = null; let on = false;

        function login() {
            let u = document.getElementById('user-in').value.trim();
            let p = document.getElementById('pass-in').value.trim();
            if(db[u] && db[u].pass === p) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                if(ADM_LIST.includes(u)) { document.getElementById('adm-btn').classList.remove('hidden'); refreshAdmList(); }
                updateArea(); renderMatricole();
            } else alert("Accesso Negato.");
        }

        function updateArea() {
            document.getElementById('u-grado').innerText = db[user].grado;
            document.getElementById('u-mat').innerText = db[user].mat;
            document.getElementById('u-ore').innerText = fmt(db[user].ore);
        }

        function showDay(d, e) {
            document.getElementById('day-title').innerText = "OPERATIVITÀ: " + d.toUpperCase();
            document.getElementById('p-list').innerText = tr[d].p;
            document.getElementById('s-list').innerText = tr[d].s;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active-day'));
            e.target.classList.add('active-day');
        }

        function tab(id) {
            ["area", "servizio", "turni", "matricole", "admin"].forEach(t => {
                const el = document.getElementById(t);
                if(el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function renderMatricole() {
            let b = document.getElementById('m-body');
            const sorted = Object.keys(db).sort((x,y) => db[x].mat.localeCompare(db[y].mat, undefined, {numeric: true}));
            b.innerHTML = sorted.map(k => `<tr><td>${db[k].mat}</td><td>${k}</td><td>${db[k].grado}</td></tr>`).join('');
        }

        function refreshAdmList() {
            let s = document.getElementById('s-sel');
            s.innerHTML = '';
            Object.keys(db).sort().forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
        }

        function toggleT() {
            let b = document.getElementById('t-btn');
            if(!on) {
                on = true; b.innerText = "TERMINA"; b.style.background = "var(--danger)";
                interval = setInterval(() => { sec++; document.getElementById('timer-val').innerText = fmt(sec); }, 1000);
            } else {
                on = false; b.innerText = "AVVIA SESSIONE"; b.style.background = "var(--blue)";
                clearInterval(interval); db[user].ore += sec; sec = 0;
                document.getElementById('timer-val').innerText = "00:00:00";
                save(); updateArea();
            }
        }

        function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
        function save() { 
            localStorage.setItem('ITDR_V28_DB', JSON.stringify(db)); 
            localStorage.setItem('ITDR_V28_TR', JSON.stringify(tr)); 
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ITDR STAFF PORTAL v17</title>
    <style>
        :root { --blue: #007bff; --dark: #051e34; --danger: #dc3545; --accent: #00d4ff; --glass: rgba(0, 123, 255, 0.1); }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .hidden { display: none !important; }
        
        /* Navbar Centrata */
        nav { background: var(--dark); padding: 15px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid var(--blue); position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
        nav button { background: var(--glass); color: #fff; border: 1px solid var(--blue); padding: 10px 18px; cursor: pointer; font-weight: bold; border-radius: 50px; transition: 0.3s; text-transform: uppercase; font-size: 10px; }
        nav button:hover { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .btn-adm { border-color: #f39c12 !important; color: #f39c12 !important; }

        .container { padding: 30px; max-width: 1100px; margin: auto; text-align: center; }

        /* Griglia e Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        .card { background: var(--dark); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .card h3 { color: var(--accent); margin: 0; font-size: 11px; text-transform: uppercase; }
        .card p { font-size: 18px; margin: 8px 0; font-weight: bold; }

        .img-header { width: 100%; max-width: 500px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--blue); }

        /* Turni 7 Giorni */
        .days-nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .day-btn { background: #0a2540; border: 1px solid #1a3a5a; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 11px; }
        .day-btn:hover { border-color: var(--accent); color: var(--accent); }
        .active-day { background: var(--blue); border-color: var(--accent); }

        /* Matricole */
        .m-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--dark); border-radius: 10px; overflow: hidden; }
        .m-table th, .m-table td { padding: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: left; font-size: 14px; }
        .m-table th { background: var(--blue); color: white; text-transform: uppercase; font-size: 11px; }

        /* Admin */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        .admin-card { background: #0a2540; padding: 20px; border-radius: 12px; border: 1px solid #1a3a5a; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; background: var(--blue); border: none; color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 5px; }
        
        #timer-val { font-size: 55px; font-weight: 900; margin: 15px 0; display: block; }
    </style>
</head>
<body>

    <div id="login-screen" style="height:100vh; display:flex; justify-content:center; align-items:center; background:#000;">
        <div style="background:var(--dark); padding:35px; border-radius:20px; border:1px solid var(--blue); text-align:center; width:340px;">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp" width="70">
            <h2 style="margin:20px 0;">ITDR STAFF</h2>
            <input type="text" id="user-in" placeholder="Nome">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn-save" onclick="login()">ACCEDI</button>
        </div>
    </div>

    <div id="portal" class="hidden">
        <nav>
            <button onclick="tab('area')">Area Personale</button>
            <button onclick="tab('servizio')">Servizio Staff</button>
            <button onclick="tab('turni')">Turni Staff</button>
            <button onclick="tab('matricole')">Lista Matricole</button>
            <button id="adm-btn" class="hidden btn-adm" onclick="tab('admin')">Pannello Staff</button>
            <button onclick="location.reload()" style="border-color:var(--danger); color:var(--danger);">Esci</button>
        </nav>

        <div class="container">
            <section id="area">
                <div class="grid">
                    <div class="card"><h3>Grado</h3><p id="u-grado">-</p></div>
                    <div class="card"><h3>Matricola</h3><p id="u-mat">-</p></div>
                    <div class="card"><h3>Ore Totali</h3><p id="u-ore">00:00:00</p></div>
                    <div class="card"><h3>Richiami</h3><p id="u-warns" style="color:red">0</p></div>
                </div>
            </section>

            <section id="servizio" class="hidden">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773150993/dp66lxgcjwmtonwpc9gc.png" class="img-header">
                <div class="card">
                    <span id="timer-val">00:00:00</span>
                    <button id="t-btn" class="btn-save" onclick="toggleT()">INIZIA SERVIZIO</button>
                </div>
            </section>

            <section id="turni" class="hidden">
                <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773151042/g2bk1uwpi9jybgexnerm.png" class="img-header">
                <div class="days-nav">
                    <button class="day-btn" onclick="showDay('Lunedi')">Lunedì</button>
                    <button class="day-btn" onclick="showDay('Martedi')">Martedì</button>
                    <button class="day-btn" onclick="showDay('Mercoledi')">Mercoledì</button>
                    <button class="day-btn" onclick="showDay('Giovedi')">Giovedì</button>
                    <button class="day-btn" onclick="showDay('Venerdi')">Venerdì</button>
                    <button class="day-btn" onclick="showDay('Sabato')">Sabato</button>
                    <button class="day-btn" onclick="showDay('Domenica')">Domenica</button>
                </div>
                <div id="shift-res" class="card">
                    <h2 id="day-title" style="color:var(--accent);">Seleziona un giorno</h2>
                    <div class="grid">
                        <div class="card"><h3>Pomeriggio (14:00 - 19:00)</h3><p id="p-list" style="font-size:14px; color:#ddd;">-</p></div>
                        <div class="card"><h3>Sera (21:00 - 01:00)</h3><p id="s-list" style="font-size:14px; color:#ddd;">-</p></div>
                    </div>
                </div>
            </section>

            <section id="matricole" class="hidden">
                <table class="m-table">
                    <thead><tr><th>Matricola</th><th>Nome</th><th>Grado</th></tr></thead>
                    <tbody id="m-body"></tbody>
                </table>
            </section>

            <section id="admin" class="hidden">
                <div class="admin-grid">
                    <div class="admin-card">
                        <h3>Gestione Staffer</h3>
                        <select id="s-sel" onchange="loadStaffData()"><option value="">Scegli Staffer...</option></select>
                        <input type="text" id="ed-g" placeholder="Grado">
                        <input type="text" id="ed-m" placeholder="Matricola">
                        <input type="number" id="ed-h" placeholder="Secondi Totali">
                        <button class="btn-save" onclick="saveStaffData()">SALVA DATI</button>
                        <button class="btn-save" style="background:var(--danger)" onclick="resetOre()">RESET ORE</button>
                    </div>
                    <div class="admin-card">
                        <h3>Modifica Turni</h3>
                        <select id="e-day">
                            <option value="Lunedi">Lunedi</option><option value="Martedi">Martedi</option>
                            <option value="Mercoledi">Mercoledi</option><option value="Giovedi">Giovedi</option>
                            <option value="Venerdi">Venerdi</option><option value="Sabato">Sabato</option>
                            <option value="Domenica">Domenica</option>
                        </select>
                        <textarea id="e-p" placeholder="3 Nomi Pomeriggio..."></textarea>
                        <textarea id="e-s" placeholder="3 Nomi Sera..."></textarea>
                        <button class="btn-save" style="background:#f39c12" onclick="saveT()">SALVA TURNI SETTIMANALI</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const ADM = ["Daniel", "Michele", "Mav", "Arduino", "Strepitoso", "Archadian", "Djsamy", "Cobra", "Baj", "Mirko", "Maverick", "Pavel", "Diego"];
        let db = JSON.parse(localStorage.getItem('ITDR_V17_DB')) || {};
        let tr = JSON.parse(localStorage.getItem('ITDR_V17_TR')) || {
            "Lunedi":{p:"Barone, Hydro, Fabbri", s:"Matz, Nathalino, Viper"},
            "Martedi":{p:"Xenoo, Adamo, Gabriel", s:"Chorno, Joker, Nenne"},
            "Mercoledi":{p:"Mattia, Lollo, Simo", s:"Vortex, Void, Sangue"},
            "Giovedi":{p:"Ibra, Noxen, Ash", s:"Barone, Hydro, Fabbri"},
            "Venerdi":{p:"Matz, Nathalino, Viper", s:"Xenoo, Adamo, Gabriel"},
            "Sabato":{p:"Chorno, Joker, Nenne", s:"Mattia, Lollo, Simo"},
            "Domenica":{p:"Vortex, Void, Sangue", s:"Ibra, Noxen, Ash"}
        };

        const RAW = [
            ["Daniel","Founder","ITD-01"],["Michele","Founder","ITD-02"],["Mav","Co-Founder","ITD-03"],["Arduino","Owner","ITD-04"],
            ["Strepitoso","Co Owner","ITD-05"],["Archadian","Co Owner","ITD-06"],["Djsamy","Community Manager","ITD-07"],["Cobra","Community Manager","ITD-08"],
            ["Baj","Server Supervisor","ITD-09"],["Mirko","Staff Manager","ITD-10"],["Maverick","Staff Manager","ITD-11"],["Pavel","Supervisor","ITD-12"],
            ["Diego","Supervisor","ITD-13"],["Barone","Head Admin","ITD-14"],["Hydro","Head Admin","ITD-15"],["Fabbri","Senior Admin","ITD-16"],
            ["Matz","Senior Admin","ITD-17"],["Nathalino","Senior Admin","ITD-18"],["Viper","Admin","ITD-19"],["Xenoo","Admin","ITD-20"],
            ["Adamo","Head Mod","ITD-21"],["Gabriel","Moderator","ITD-22"],["Chorno","Moderator","ITD-23"],["Joker","Moderator","ITD-24"],
            ["Nenne","Trial Mod","ITD-25"],["Mattia","Trial Mod","ITD-26"],["Lollo","Senior Helper","ITD-27"],["Simo","Helper","ITD-28"],
            ["Vortex","Helper","ITD-29"],["Void","Helper","ITD-30"],["Sangue","Trial Helper","ITD-31"],["Ibra","Trial Helper","ITD-32"],["Noxen","Trial Helper","ITD-33"],["Ash","Trial Helper","ITD-34"]
        ];

        if(Object.keys(db).length === 0) {
            RAW.forEach(m => { db[m[0]] = {pass: m[0]+"-01", grado: m[1], mat: m[2], ore: 0, warns: 0}; });
            save();
        }

        let user = null; let sec = 0; let interval = null; let on = false;

        function login() {
            let u = document.getElementById('user-in').value.trim();
            let p = document.getElementById('pass-in').value.trim();
            if(db[u] && db[u].pass === p) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                if(ADM.includes(u)) { document.getElementById('adm-btn').classList.remove('hidden'); refreshAdminList(); }
                updateArea(); renderMatricole();
            } else alert("Credenziali errate!");
        }

        function updateArea() {
            document.getElementById('u-grado').innerText = db[user].grado;
            document.getElementById('u-mat').innerText = db[user].mat;
            document.getElementById('u-ore').innerText = fmt(db[user].ore);
            document.getElementById('u-warns').innerText = db[user].warns;
        }

        function showDay(d) {
            document.getElementById('day-title').innerText = d;
            document.getElementById('p-list').innerText = tr[d].p;
            document.getElementById('s-list').innerText = tr[d].s;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active-day'));
            event.target.classList.add('active-day');
        }

        function renderMatricole() {
            let b = document.getElementById('m-body');
            b.innerHTML = Object.keys(db).sort((x,y) => db[x].mat.localeCompare(db[y].mat)).map(k => `<tr><td>${db[k].mat}</td><td>${k}</td><td>${db[k].grado}</td></tr>`).join('');
        }

        function toggleT() {
            let b = document.getElementById('t-btn');
            if(!on) {
                on = true; b.innerText = "FINE SERVIZIO"; b.style.background = "red";
                interval = setInterval(() => { sec++; document.getElementById('timer-val').innerText = fmt(sec); }, 1000);
            } else {
                on = false; b.innerText = "INIZIA SERVIZIO"; b.style.background = "var(--blue)";
                clearInterval(interval); db[user].ore += sec; sec = 0; save(); updateArea();
                document.getElementById('timer-val').innerText = "00:00:00";
            }
        }

        function loadStaffData() {
            let s = document.getElementById('s-sel').value;
            if(!s) return;
            document.getElementById('ed-g').value = db[s].grado;
            document.getElementById('ed-m').value = db[s].mat;
            document.getElementById('ed-h').value = db[s].ore;
        }

        function saveStaffData() {
            let s = document.getElementById('s-sel').value;
            db[s].grado = document.getElementById('ed-g').value;
            db[s].mat = document.getElementById('ed-m').value;
            db[s].ore = parseInt(document.getElementById('ed-h').value);
            save(); alert("Aggiornato!"); updateArea(); renderMatricole();
        }

        function resetOre() {
            let s = document.getElementById('s-sel').value;
            if(confirm("Reset ore?")) { db[s].ore = 0; save(); loadStaffData(); updateArea(); }
        }

        function saveT() {
            let d = document.getElementById('e-day').value;
            tr[d] = { p: document.getElementById('e-p').value, s: document.getElementById('e-s').value };
            save(); alert("Turni Settimanali salvati!");
        }

        function refreshAdminList() {
            let s = document.getElementById('s-sel');
            s.innerHTML = '<option value="">Scegli Staffer...</option>';
            Object.keys(db).sort().forEach(k => s.innerHTML += `<option value="${k}">${k}</option>`);
        }

        function fmt(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
        function save() { 
            localStorage.setItem('ITDR_V17_DB', JSON.stringify(db)); 
            localStorage.setItem('ITDR_V17_TR', JSON.stringify(tr)); 
        }
        function tab(id) {
            ["area", "servizio", "turni", "admin", "matricole"].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>

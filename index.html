<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Staff Panel RP | Melonly Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.7);
            --panel-solid: #0F172A;
            --primary: #38BDF8;
            --primary-glow: rgba(56, 189, 248, 0.4);
            --text: #F1F5F9;
            --muted: #94A3B8;
            --border: rgba(56, 189, 248, 0.2);
            --danger: #EF4444;
            --success: #10B981;
            --warning: #F59E0B;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.05) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        @keyframes blurIn {
            from { opacity: 0; filter: blur(10px); transform: translateY(20px); }
            to { opacity: 1; filter: blur(0); transform: translateY(0); }
        }

        /* --- LOGIN VIEW --- */
        .login-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--panel);
            backdrop-filter: blur(16px);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: blurIn 0.8s ease-out;
        }

        .login-logo img { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--primary-glow)); }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(2, 6, 23, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            outline: none;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .btn-main {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #0EA5E9);
            border: none;
            border-radius: 12px;
            color: #020617;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- APP LAYOUT --- */
        .navbar {
            height: 80px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .nav-brand img { height: 45px; }

        .nav-menu { display: flex; gap: 10px; background: rgba(2, 6, 23, 0.4); padding: 6px; border-radius: 16px; border: 1px solid var(--border); }
        .nav-item {
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--muted);
            transition: 0.3s;
        }
        .nav-item.active { color: var(--primary); background: rgba(56, 189, 248, 0.1); }

        main { padding: 40px; max-width: 1400px; margin: 0 auto; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--panel); padding: 24px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-card .value { font-size: 2.2rem; font-weight: 700; color: var(--primary); }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { background: var(--panel); border-radius: 24px; border: 1px solid var(--border); padding: 30px; margin-bottom: 20px; }

        /* BADGES */
        .badge { padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; border: 1px solid; }
        .role-founder { border-color: #EF4444; color: #EF4444; background: rgba(239, 68, 68, 0.1); }
        .role-admin { border-color: #F97316; color: #F97316; background: rgba(249, 115, 22, 0.1); }
        .role-mod { border-color: #3B82F6; color: #3B82F6; background: rgba(59, 130, 246, 0.1); }

        .field-input, .field-select, .field-area {
            width: 100%; background: rgba(2, 6, 23, 0.5); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; margin-bottom: 15px;
        }
        .duty-box { text-align: center; padding: 20px; border-radius: 20px; background: rgba(2, 6, 23, 0.3); border: 1px dashed var(--border); }
        .timer-val { font-size: 2.5rem; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div id="login-view" class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">
            <img src="https://res.cloudinary.com/dec4vnmzg/image/upload/v1775515801/rjmv1dsam6nqf1jfmnfw.webp" alt="Logo">
        </div>
        <h2 style="margin-bottom: 10px;">Staff Access</h2>
        <div id="login-error" class="hidden" style="background: rgba(239,68,68,0.1); color: #FCA5A5; padding: 10px; border-radius: 10px; margin-bottom: 20px;"></div>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="login-user" placeholder="Es: Mario_Rossi">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="login-pass" placeholder="••••••••">
        </div>
        <button class="btn-main" id="btn-login">ACCEDI AL PANEL</button>
    </div>
</div>

<div id="app-view" class="hidden">
    <nav class="navbar">
        <div class="nav-brand">
            <img src="https://res.cloudinary.com/dec4vnmzg/image/upload/v1775515801/rjmv1dsam6nqf1jfmnfw.webp" alt="Logo">
            <span>MELONLY STAFF</span>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" data-sec="dashboard">Dashboard</div>
            <div class="nav-item" data-sec="duty">Duty Shift</div>
            <div class="nav-item" data-sec="punishments">Logs</div>
            <div class="nav-item" data-sec="manager">Manager</div>
        </div>
        <button id="btn-logout" style="border: 1px solid var(--danger); color: var(--danger); background:none; padding:8px 15px; border-radius:10px; cursor:pointer;">LOGOUT</button>
    </nav>

    <main>
        <section id="sec-dashboard">
            <div class="stats-grid">
                <div class="stat-card"><h3>Staff Online</h3><div class="value" id="stat-online">0</div></div>
                <div class="stat-card"><h3>Sanzioni</h3><div class="value" id="stat-logs">0</div></div>
                <div class="stat-card"><h3>Le Mie Ore</h3><div class="value" id="stat-my-hours">0.0</div></div>
            </div>
            <div class="content-grid">
                <div class="card"><canvas id="mainChart"></canvas></div>
                <div class="card"><div id="online-list"></div></div>
            </div>
        </section>

        <section id="sec-duty" class="hidden">
            <div class="card" style="max-width: 500px;">
                <div class="duty-box">
                    <div id="duty-timer" class="timer-val">00:00:00</div>
                    <button id="duty-start" class="btn-main" style="margin-top:20px;">INIZIA TURNO</button>
                    <button id="duty-end" class="btn-main hidden" style="background:var(--danger); margin-top:20px;">FINE TURNO</button>
                </div>
            </div>
        </section>

        <section id="sec-punishments" class="hidden">
            <div class="card">
                <h3>Nuova Sanzione</h3>
                <input id="log-target" class="field-input" placeholder="Utente">
                <select id="log-type" class="field-select"><option>Warn</option><option>Kick</option><option>Ban</option></select>
                <textarea id="log-reason" class="field-area" placeholder="Motivazione"></textarea>
                <button id="btn-create-log" class="btn-main">SALVA LOG</button>
            </div>
        </section>

        <section id="sec-manager" class="hidden">
            <div id="manager-lock" class="card" style="max-width: 400px; margin: 0 auto;">
                <h3>Password Master</h3>
                <input type="password" id="master-pass" class="field-input">
                <button id="btn-unlock-manager" class="btn-main">SBLOCCA</button>
            </div>
            <div id="manager-content" class="hidden">
                <div class="card">
                    <table style="width:100%">
                        <thead><tr><th>User</th><th>Ruolo</th><th>Ore</th></tr></thead>
                        <tbody id="manager-staff-table"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
// --- CONFIGURAZIONE ---
const firebaseConfig = { databaseURL: "https://staffpanelrp-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const bcrypt = dcodeIO.bcrypt;

let currentUser = null;
let dutyTime = 0;
let dutyInterval = null;

// --- LOGIN ---
document.getElementById('btn-login').addEventListener('click', async () => {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;
    const err = document.getElementById('login-error');

    if(!user || !pass) return;

    try {
        const snap = await db.ref("staff/" + user).get();
        if(!snap.exists()) {
            err.textContent = "Utente non trovato.";
            err.classList.remove('hidden');
            return;
        }

        const data = snap.val();
        const match = bcrypt.compareSync(pass, data.passwordHash);

        if(match) {
            currentUser = user;
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            initApp();
        } else {
            err.textContent = "Password errata.";
            err.classList.remove('hidden');
        }
    } catch(e) {
        console.error(e);
        err.textContent = "Errore critico DB.";
        err.classList.remove('hidden');
    }
});

function initApp() {
    // Navigazione
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const sec = item.getAttribute('data-sec');
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('sec-' + sec).classList.remove('hidden');
            item.classList.add('active');
        });
    });

    document.getElementById('btn-logout').onclick = () => location.reload();

    // Dashboard Stats
    db.ref('staff').on('value', snap => {
        let count = 0;
        const list = document.getElementById('online-list');
        list.innerHTML = "<h4>Staff Online:</h4>";
        snap.forEach(s => {
            if(s.val().dutyStatus === "online") {
                count++;
                list.innerHTML += "<div>" + s.key + " (" + s.val().role + ")</div>";
            }
            if(s.key === currentUser) document.getElementById('stat-my-hours').textContent = (s.val().hours || 0).toFixed(1);
        });
        document.getElementById('stat-online').textContent = count;
    });

    // Duty
    const btnStart = document.getElementById('duty-start');
    const btnEnd = document.getElementById('duty-end');
    
    btnStart.onclick = () => {
        btnStart.classList.add('hidden');
        btnEnd.classList.remove('hidden');
        db.ref('staff/' + currentUser).update({ dutyStatus: "online" });
        dutyInterval = setInterval(() => {
            dutyTime++;
            document.getElementById('duty-timer').textContent = new Date(dutyTime * 1000).toISOString().substr(11, 8);
        }, 1000);
    };

    btnEnd.onclick = async () => {
        clearInterval(dutyInterval);
        const snap = await db.ref('staff/' + currentUser).get();
        const oldHours = snap.val().hours || 0;
        await db.ref('staff/' + currentUser).update({
            dutyStatus: "offline",
            hours: oldHours + (dutyTime / 3600)
        });
        location.reload();
    };

    // Manager Unlock
    document.getElementById('btn-unlock-manager').onclick = async () => {
        const p = document.getElementById('master-pass').value;
        const snap = await db.ref('settings/masterKey').get();
        if(p === (snap.val() || "admin123")) {
            document.getElementById('manager-lock').classList.add('hidden');
            document.getElementById('manager-content').classList.remove('hidden');
            loadManagerTable();
        }
    };
}

function loadManagerTable() {
    db.ref('staff').on('value', snap => {
        const tbody = document.getElementById('manager-staff-table');
        tbody.innerHTML = "";
        snap.forEach(s => {
            tbody.innerHTML += "<tr><td>" + s.key + "</td><td>" + s.val().role + "</td><td>" + (s.val().hours || 0).toFixed(1) + "h</td></tr>";
        });
    });
}
</script>
</body>
</html>

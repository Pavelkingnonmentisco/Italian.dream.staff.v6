<section id="pannello-staff" class="tab-content" style="display:none;">
    <div class="admin-container">
        <div class="admin-header"><h2>Gestione Personale</h2></div>
        
        <div class="admin-card arruolamento">
            <h3><i class="fas fa-user-plus"></i> Arruolamento Nuovo Staff</h3>
            <div class="input-grid-admin">
                <input type="text" id="new-name" placeholder="Nome">
                <input type="text" id="new-pass" placeholder="Password">
                <input type="text" id="new-grade" placeholder="Grado">
                <input type="text" id="new-mat" placeholder="Matricola">
            </div>
            <button class="btn-submit" style="margin-top: 15px;" onclick="addNewStaff()">Aggiungi nel Database</button>
        </div>

        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #222;">

        <h3>Modifica o Rimuovi Staffer</h3>
        <select id="staff-selector" onchange="loadStaffMember()">
            <option value="">Seleziona uno staffer...</option>
        </select>

        <div id="admin-controls" style="display:none; margin-top: 20px;">
            <div class="admin-card">
                <h3>Dati Staffer</h3>
                <div class="input-group">
                    <input type="text" id="edit-grado" placeholder="Nuovo Grado">
                    <button class="btn-action" onclick="updateStaffGrado()">Salva Grado</button>
                </div>
                <div class="input-group" style="margin-top:10px;">
                    <input type="text" id="edit-matricola" placeholder="Nuova Matricola">
                    <button class="btn-action" onclick="updateStaffMatricola()">Salva Mat.</button>
                </div>
            </div>
            <div class="admin-card">
                <h3>Provvedimenti e Gestione</h3>
                <div class="admin-btn-row">
                    <button class="btn-action btn-danger" onclick="modifyWarns(1)">+ Richiamo</button>
                    <button class="btn-action" onclick="modifyWarns(-1)">- Richiamo</button>
                    <button class="btn-action" onclick="resetHours()">Reset Ore/Log</button>
                </div>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid #333;">
                <button class="btn-submit" style="background: #ce1212;" onclick="removeStaff()">
                    <i class="fas fa-user-minus"></i> Rimuovi Staffer Permanentemente
                </button>
            </div>
        </div>
    </div>
</section>

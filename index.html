<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Houston Roleplay - Dashboard</title>
<style>
  /* Colori ispirati al logo */
  :root {
    --primary-color: #8B4513; /* marrone caldo */
    --accent-color: #FFD700; /* oro */
    --background-color: #222; /* sfondo scuro */
    --text-color: #fff;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: var(--background-color);
    color: var(--text-color);
  }

  /* Navbar */
  .navbar {
    display: flex;
    align-items: center;
    background-color: var(--primary-color);
    padding: 10px 20px;
  }
  .navbar h1 {
    margin: 0;
    font-size: 24px;
    flex: 1;
  }
  .navbar button {
    padding: 8px 16px;
    background-color: var(--accent-color);
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  /* Main content */
  .content {
    padding: 20px;
  }

  /* Sezione staff */
  .staff-area {
    margin-top: 20px;
    background-color: #333;
    padding: 15px;
    border-radius: 8px;
  }

  /* Pulsanti shift/pausa */
  .shift-buttons {
    margin-top: 20px;
  }
  .shift-buttons button {
    padding: 10px 20px;
    margin-right: 10px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  .shift-active {
    background-color: #28a745;
    color: white;
  }
  .shift-inactive {
    background-color: #dc3545;
    color: white;
  }
</style>
</head>
<body>

<!-- Navbar -->
<div class="navbar" id="navbar">
  <h1>Houston Roleplay Dashboard</h1>
  <button onclick="logout()">Logout</button>
</div>

<!-- Contenuto principale -->
<div class="content" id="mainContent">
  <!-- Area staff -->
  <div class="staff-area" id="staffArea">
    <h2>Area Personale Staff</h2>
    <p>Nome: <span id="staffName">Mario Rossi</span></p>
    <p>Matricola: <span id="staffMatricola">12345</span></p>
    <p>Grado: <span id="staffGrade">Sergente</span></p>
    <p>Ore di servizio: <span id="serviceHours">120</span></p>
    <h3>Richiami</h3>
    <ul id="callsList">
      <li>Richiamo 1</li>
      <li>Richiamo 2</li>
    </ul>
  </div>

  <!-- Pulsanti shift e pausa -->
  <div class="shift-buttons" id="shiftButtons">
    <button class="shift-inactive" id="shiftBtn" onclick="toggleShift()">Attiva Shift</button>
    <button class="shift-inactive" id="pauseBtn" onclick="togglePause()">Pausa</button>
  </div>
</div>

<!-- Script -->
<script>
  let shiftActive = false;
  let onPause = false;

  function logout() {
    alert("Logout...");
    // Qui puoi aggiungere la logica di logout
  }

  function toggleShift() {
    shiftActive = !shiftActive;
    const shiftBtn = document.getElementById('shiftBtn');
    if (shiftActive) {
      shiftBtn.innerText = "Disattiva Shift";
      shiftBtn.className = "shift-active";
    } else {
      shiftBtn.innerText = "Attiva Shift";
      shiftBtn.className = "shift-inactive";
    }
  }

  function togglePause() {
    onPause = !onPause;
    const pauseBtn = document.getElementById('pauseBtn');
    if (onPause) {
      pauseBtn.innerText = "Riprendi";
      pauseBtn.className = "shift-active";
    } else {
      pauseBtn.innerText = "Pausa";
      pauseBtn.className = "shift-inactive";
    }
  }
</script>

</body>
</html>

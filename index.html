<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Melonly Staff Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0F172A; padding: 30px; border-radius: 15px; border: 1px solid #38BDF8; text-align: center; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #1E293B; background: #020617; color: white; }
        button { width: 100%; padding: 10px; background: #38BDF8; border: none; color: #020617; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .hidden { display: none; }
        #app-view { width: 90%; height: 90%; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-view" class="card">
    <h2>Staff Login</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button id="login-btn">ACCEDI</button>
    <p id="error" style="color: red; font-size: 12px;" class="hidden">Credenziali errate!</p>
</div>

<!-- PANEL (Semplificato) -->
<div id="app-view" class="card hidden">
    <h1>Benvenuto, <span id="display-name"></span>!</h1>
    <p>Il pannello è attivo e collegato a Firebase.</p>
    <button onclick="location.reload()">LOGOUT</button>
</div>

<script>
// CONFIGURAZIONE FIREBASE (Usa i tuoi dati)
const firebaseConfig = { databaseURL: "https://staffpanelrp-default-rtdb.europe-west1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

document.getElementById('login-btn').onclick = async () => {
    const user = document.getElementById('user').value;
    const pass = document.getElementById('pass').value;
    
    // Cerchiamo l'utente nel database
    const snap = await db.ref("staff/" + user).get();
    
    if (snap.exists()) {
        const userData = snap.val();
        
        // CONTROLLO PASSWORD SEMPLICE (In chiaro)
        if (userData.password === pass) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('app-view').classList.remove('hidden');
            document.getElementById('display-name').textContent = user;
        } else {
            document.getElementById('error').classList.remove('hidden');
        }
    } else {
        document.getElementById('error').classList.remove('hidden');
    }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Portale ITDR - Gestione Totale</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="login-overlay">
        <div class="glass-box">
            <img src="https://res.cloudinary.com/dbxwiln0a/image/upload/v1773088043/mahwplqpvvuy34vczm3j.webp" width="60">
            <h2>ITDR LOGIN</h2>
            <input type="text" id="username" placeholder="Nome Utente">
            <input type="password" id="password" placeholder="Password">
            <button onclick="checkLogin()" class="btn-primary">ACCEDI</button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <nav class="navbar">
            <span class="logo">ITDR STAFF</span>
            <div class="menu">
                <button onclick="tab('area-personale')">Area Personale</button>
                <button onclick="tab('turni')">Turni</button>
                <button id="admin-link" style="display:none;" onclick="tab('admin')">PANNELLO ADMIN</button>
            </div>
            <button onclick="location.reload()" class="logout">ESCI</button>
        </nav>

        <div class="container">
            <section id="area-personale" class="page">
                <div class="grid">
                    <div class="card"><h3>GRADO</h3><p id="u-grado">-</p></div>
                    <div class="card"><h3>MATRICOLA</h3><p id="u-mat">-</p></div>
                    <div class="card"><h3>ORE TOTALI</h3><p id="u-ore">00:00:00</p></div>
                    <div class="card"><h3>RICHIAMI</h3><p id="u-warns" style="color:red">0</p></div>
                </div>
            </section>

            <section id="turni" class="page" style="display:none;">
                <div class="timer-card">
                    <h2 id="timer">00:00:00</h2>
                    <button id="b-start" onclick="startT()">INIZIA</button>
                    <button id="b-stop" style="display:none;" onclick="stopT()">FINE</button>
                </div>
                <div id="logs"></div>
            </section>

            <section id="admin" class="page" style="display:none;">
                <div class="admin-grid">
                    <div class="card-admin">
                        <h3>AGGIUNGI STAFF</h3>
                        <input type="text" id="n-n" placeholder="Nome">
                        <input type="text" id="n-p" placeholder="Password">
                        <input type="text" id="n-g" placeholder="Grado">
                        <input type="text" id="n-m" placeholder="Matricola">
                        <button onclick="addS()">AGGIUNGI</button>
                    </div>
                    <div class="card-admin">
                        <h3>GESTISCI STAFF</h3>
                        <select id="staff-list" onchange="loadS()"></select>
                        <div id="edit-zone" style="display:none; margin-top:10px;">
                            <input type="text" id="e-g">
                            <input type="text" id="e-m">
                            <button onclick="saveS()">SALVA</button>
                            <button onclick="delS()" style="background:red">ELIMINA STAFF</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITDR STAFF PORTAL v32.0 | 2026</title>
    <style id="custom-theme">
        :root {
            --gold: #D4AF37;
            --dark-bg: #000000;
            --card-bg: #0a0a0a;
            --danger: #ff4d4d;
        }
    </style>
    <style>
        body {
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- NAVBAR --- */
        nav {
            background: #050505;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo { height: 45px; width: 45px; border-radius: 50%; border: 2px solid var(--gold); }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; flex: 1; }

        nav button {
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
            font-size: 10px;
        }

        nav button:hover { background: var(--gold); color: #000; }

        /* --- LAYOUT --- */
        .container { padding: 30px; max-width: 1200px; margin: auto; text-align: center; flex: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .card h3 { color: var(--gold); margin: 0; font-size: 11px; text-transform: uppercase; }
        
        .img-header { width: 100%; max-width: 550px; border-radius: 15px; margin-bottom: 30px; border: 2px solid var(--gold); }

        .m-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid rgba(212, 175, 55, 0.2); }
        .m-table th { background: var(--gold); color: black; padding: 15px; text-align: left; }

        /* --- ADMIN GRID --- */
        .admin-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            text-align: left; 
        }
        .admin-card { 
            background: #080808; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        input, select, textarea { 
            width: 100%; padding: 10px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box;
        }
        
        .btn-primary { width: 100%; padding: 12px; background: var(--gold); border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 6px; }
        
        #timer-val { font-size: 60px; font-weight: 900; color: var(--gold); }
        footer { background: #050505; padding: 15px; text-align: center; font-size: 11px; color: var(--gold); border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div id="login-screen" style="height:100vh; display:flex; justify-content:center; align-items:center;">
        <div class="admin-card" style="width:300px; text-align:center;">
            <h2 id="login-title" style="color:var(--gold)">ITDR LOGIN</h2>
            <input type="text" id="user-in" placeholder="Username">
            <input type="password" id="pass-in" placeholder="Password">
            <button class="btn-primary" onclick="login()">ACCEDI</button>
        </div>
    </div>

    <div id="portal" class="hidden">
        <nav>
            <img src="" class="nav-logo logo-img">
            <div class="nav-links">
                <button onclick="tab('area')">Home</button>
                <button onclick="tab('servizio')">Servizio</button>
                <button onclick="tab('matricole')">Membri</button>
                <button id="adm-btn" class="hidden" onclick="tab('admin')">Admin</button>
                <button onclick="location.reload()" style="color:var(--danger)">Esci</button>
            </div>
            <img src="" class="nav-logo logo-img">
        </nav>

        <div class="container">
            <section id="area">
                <img src="" class="img-header banner-home">
                <div class="grid">
                    <div class="card"><h3>Grado</h3><p id="u-grado">-</p></div>
                    <div class="card"><h3>Matricola</h3><p id="u-mat">-</p></div>
                </div>
            </section>

            <section id="servizio" class="hidden">
                <img src="" class="img-header banner-servizio">
                <div class="card"><span id="timer-val">00:00:00</span></div>
            </section>

            <section id="matricole" class="hidden">
                <img src="" class="img-header banner-membri">
                <table class="m-table">
                    <thead><tr><th>Mat.</th><th>Staffer</th><th>Grado</th></tr></thead>
                    <tbody id="m-body"></tbody>
                </table>
            </section>

            <section id="admin" class="hidden">
                <div class="admin-grid">
                    <div class="admin-card">
                        <h3 style="color:var(--gold)">🎨 DESIGN & ESTETICA</h3>
                        <label>Colore Principale:</label>
                        <input type="color" id="cfg-color" onchange="updateTheme()">
                        
                        <label>Logo Navigazione (URL):</label>
                        <input type="text" id="cfg-logo" placeholder="URL GIF/PNG" onchange="updateTheme()">
                        
                        <label>Banner Home (URL):</label>
                        <input type="text" id="cfg-b-home" placeholder="URL Immagine" onchange="updateTheme()">
                        
                        <label>Banner Servizio (URL):</label>
                        <input type="text" id="cfg-b-serv" placeholder="URL Immagine" onchange="updateTheme()">
                        
                        <label>Banner Membri (URL):</label>
                        <input type="text" id="cfg-b-memb" placeholder="URL Immagine" onchange="updateTheme()">
                        
                        <button class="btn-primary" onclick="saveTheme()">SALVA ESTETICA</button>
                    </div>

                    <div class="admin-card">
                        <h3 style="color:var(--gold)">AGGIUNGI MEMBRO</h3>
                        <input type="text" id="new-u" placeholder="Nome">
                        <input type="text" id="new-g" placeholder="Grado">
                        <input type="text" id="new-m" placeholder="Matricola">
                        <button class="btn-primary" onclick="addMember()">AGGIUNGI</button>
                    </div>
                </div>
            </section>
        </div>
        <footer>© 2026 ITDR Staff Portal | Design Customizable</footer>
    </div>

    <script>
        const ADM_LIST = ["Daniel", "Pavel", "Michele", "Mav"]; // Aggiungi chi vuoi
        
        // Database e Tema
        let db = JSON.parse(localStorage.getItem('ITDR_V32_DB')) || {
            "Pavel": { pass: "Pavel-01", grado: "Admin", mat: "ITD-01", ore: 0 }
        };
        
        let theme = JSON.parse(localStorage.getItem('ITDR_THEME')) || {
            color: "#D4AF37",
            logo: "https://res.cloudinary.com/dbxwiln0a/image/upload/v1773155102/q616frliniciy9cdxhsk.gif",
            bHome: "https://res.cloudinary.com/dbxwiln0a/image/upload/v1773154806/xtb9kcfg5ian3x9fiq9w.gif",
            bServ: "https://res.cloudinary.com/dbxwiln0a/image/upload/v1773150993/dp66lxgcjwmtonwpc9gc.png",
            bMemb: "https://res.cloudinary.com/dbxwiln0a/image/upload/v1773150993/dp66lxgcjwmtonwpc9gc.png"
        };

        let user = null;

        function applyTheme() {
            document.getElementById('custom-theme').innerHTML = `
                :root {
                    --gold: ${theme.color};
                    --dark-bg: #000000;
                    --card-bg: #0a0a0a;
                    --danger: #ff4d4d;
                }
            `;
            document.querySelectorAll('.logo-img').forEach(img => img.src = theme.logo);
            document.querySelector('.banner-home').src = theme.bHome;
            document.querySelector('.banner-servizio').src = theme.bServ;
            document.querySelector('.banner-membri').src = theme.bMemb;
            
            // Popola i campi admin con i valori attuali
            document.getElementById('cfg-color').value = theme.color;
            document.getElementById('cfg-logo').value = theme.logo;
            document.getElementById('cfg-b-home').value = theme.bHome;
            document.getElementById('cfg-b-serv').value = theme.bServ;
            document.getElementById('cfg-b-memb').value = theme.bMemb;
        }

        function updateTheme() {
            theme.color = document.getElementById('cfg-color').value;
            theme.logo = document.getElementById('cfg-logo').value;
            theme.bHome = document.getElementById('cfg-b-home').value;
            theme.bServ = document.getElementById('cfg-b-serv').value;
            theme.bMemb = document.getElementById('cfg-b-memb').value;
            applyTheme();
        }

        function saveTheme() {
            localStorage.setItem('ITDR_THEME', JSON.stringify(theme));
            alert("Estetica salvata correttamente!");
        }

        function login() {
            let u = document.getElementById('user-in').value;
            let p = document.getElementById('pass-in').value;
            if(db[u] && db[u].pass === p) {
                user = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('portal').classList.remove('hidden');
                if(ADM_LIST.includes(u)) document.getElementById('adm-btn').classList.remove('hidden');
                document.getElementById('u-grado').innerText = db[u].grado;
                document.getElementById('u-mat').innerText = db[u].mat;
                renderMatricole();
                applyTheme();
            } else alert("Accesso negato!");
        }

        function addMember() {
            let u = document.getElementById('new-u').value;
            db[u] = { pass: u+"-01", grado: document.getElementById('new-g').value, mat: document.getElementById('new-m').value };
            localStorage.setItem('ITDR_V32_DB', JSON.stringify(db));
            renderMatricole();
            alert("Membro aggiunto!");
        }

        function renderMatricole() {
            let b = document.getElementById('m-body');
            b.innerHTML = Object.keys(db).map(k => `<tr><td>${db[k].mat}</td><td>${k}</td><td>${db[k].grado}</td></tr>`).join('');
        }

        function tab(id) {
            ["area", "servizio", "matricole", "admin"].forEach(t => document.getElementById(t).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // Inizializzazione
        applyTheme();
    </script>
</body>
</html>
